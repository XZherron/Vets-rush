<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREEDOM WHEEL | VETS RUSH 🇺🇸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="game-state.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .wheel-container { position: relative; }
        #freedom-wheel-canvas { 
            transition: transform 0.1s ease-out;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
        .segment-text {
            font-size: 11px;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .result-popup {
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popIn {
            0% { transform: scale(0.6); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-950 text-white">
    <!-- Header -->
    <div class="max-w-md mx-auto px-4 pt-4 pb-2">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-x-3">
                <button onclick="saveAndReturn()" 
                        class="flex items-center gap-x-2 text-slate-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-arrow-left text-xl"></i>
                    <span class="font-medium">Back to Base</span>
                </button>
            </div>
            <div class="text-right">
                <div class="text-xs text-slate-400">FREEDOM SPINS LEFT</div>
                <div id="spins-left" class="font-mono text-3xl font-bold text-emerald-400">3</div>
            </div>
        </div>

        <div class="text-center mb-6">
            <div class="inline-flex items-center gap-x-2 bg-emerald-900/50 px-4 py-1 rounded-full">
                <i class="fa-solid fa-globe text-emerald-400"></i>
                <span class="font-bold tracking-wider text-emerald-400">FREEDOM WHEEL</span>
            </div>
            <div class="text-[10px] text-slate-400 mt-1">SPIN FOR GLORY • SUPPORT OUR VETS</div>
        </div>
    </div>

    <!-- Wheel -->
    <div class="max-w-md mx-auto px-4">
        <div class="wheel-container mx-auto w-[300px] h-[300px] relative">
            <!-- Pointer -->
            <div class="absolute top-0 left-1/2 -translate-x-1/2 -mt-2 z-20">
                <div class="w-0 h-0 border-l-[18px] border-l-transparent border-r-[18px] border-r-transparent border-b-[32px] border-b-red-500 drop-shadow-xl"></div>
            </div>
            
            <canvas id="freedom-wheel-canvas" width="300" height="300" 
                    class="rounded-full border-[10px] border-slate-700 cursor-pointer"
                    onclick="spinWheel()"></canvas>
            
            <!-- Center hub -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-slate-800 border-[6px] border-yellow-400 rounded-full flex items-center justify-center z-10 shadow-inner">
                <div class="w-8 h-8 bg-yellow-400 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-globe text-slate-900 text-xl"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Spin Button -->
    <div class="max-w-md mx-auto px-4 mt-6">
        <button onclick="spinWheel()" id="spin-btn"
                class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-4 rounded-3xl text-xl flex items-center justify-center gap-x-3 shadow-xl active:scale-[0.985] transition-all disabled:opacity-50 disabled:cursor-not-allowed">
            <i class="fa-solid fa-sync fa-spin-pulse"></i>
            <span id="spin-btn-text">SPIN THE WHEEL</span>
        </button>
        
        <div class="text-center mt-3 text-xs text-slate-400">
            1 Freedom Spin per spin • Win up to 3 extra spins!
        </div>
    </div>

    <!-- Result -->
    <div id="result-area" class="max-w-md mx-auto px-4 mt-6 hidden">
        <div class="bg-slate-900 border border-emerald-500/50 rounded-3xl p-5 text-center result-popup">
            <div id="result-icon" class="text-6xl mb-3"></div>
            <div id="result-title" class="font-bold text-2xl mb-1"></div>
            <div id="result-subtitle" class="text-emerald-400 text-sm"></div>
        </div>
    </div>

    <!-- How to Play -->
    <div class="max-w-md mx-auto px-4 mt-8 text-center">
        <div class="text-[10px] text-slate-400">Tap the wheel or button to spin • Rewards added instantly to your account</div>
    </div>
</body>
<script>
// Shared game state (same as main app + Eagle Strike)
let gameState = window.game;

let isSpinning = false;
let currentRotation = 0;
const canvas = document.getElementById('freedom-wheel-canvas');
const ctx = canvas.getContext('2d', { alpha: true });

const segments = [
    { label: "500 🪙", type: "coins", amount: 500, color: "#eab308" },
    { label: "2 ⭐", type: "stars", amount: 2, color: "#3b82f6" },
    { label: "+2 🌀", type: "freedom", amount: 2, color: "#10b981" },
    { label: "1000 🪙", type: "coins", amount: 1000, color: "#eab308" },
    { label: "1 🧨", type: "torpedoes", amount: 1, color: "#ef4444" },
    { label: "+3 🌀", type: "freedom", amount: 3, color: "#10b981" },
    { label: "750 🪙", type: "coins", amount: 750, color: "#eab308" },
    { label: "5 ⭐", type: "stars", amount: 5, color: "#3b82f6" }
];

function loadGameState() {
    const saved = localStorage.getItem('vetsRushState');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            gameState = { ...gameState, ...parsed };
        } catch (e) {}
    }
    updateSpinsDisplay();
}

function saveGameState() {
    window.game = gameState; saveGame(gameState);
}

function updateSpinsDisplay() {
    const el = document.getElementById('spins-left');
    if (el) el.innerText = gameState.freedom;
    
    const btn = document.getElementById('spin-btn');
    if (btn) {
        btn.disabled = gameState.freedom < 1;
        if (gameState.freedom < 1) {
            btn.innerHTML = `<i class="fa-solid fa-lock mr-2"></i> NO SPINS LEFT`;
        } else {
            btn.innerHTML = `<i class="fa-solid fa-sync fa-spin-pulse mr-2"></i> <span id="spin-btn-text">SPIN THE WHEEL</span>`;
        }
    }
}

function drawWheel() {
    const centerX = 150;
    const centerY = 150;
    const radius = 130;
    const segmentAngle = (2 * Math.PI) / segments.length;

    ctx.clearRect(0, 0, 300, 300);

    for (let i = 0; i < segments.length; i++) {
        const startAngle = currentRotation + (i * segmentAngle);
        const endAngle = startAngle + segmentAngle;

        // Segment fill
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = segments[i].color;
        ctx.fill();

        // Segment border
        ctx.strokeStyle = "#1e2937";
        ctx.lineWidth = 3;
        ctx.stroke();

        // Label
        const midAngle = startAngle + (segmentAngle / 2);
        const textX = centerX + Math.cos(midAngle) * (radius * 0.65);
        const textY = centerY + Math.sin(midAngle) * (radius * 0.65);

        ctx.save();
        ctx.translate(textX, textY);
        ctx.rotate(midAngle + Math.PI / 2);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 13px Inter, system-ui";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = "rgba(0,0,0,0.6)";
        ctx.shadowBlur = 3;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;
        ctx.fillText(segments[i].label, 0, 0);
        ctx.restore();
    }

    // Inner ring
    ctx.beginPath();
    ctx.arc(centerX, centerY, 38, 0, Math.PI * 2);
    ctx.fillStyle = "#0f172a";
    ctx.fill();
    ctx.strokeStyle = "#64748b";
    ctx.lineWidth = 4;
    ctx.stroke();
}

function spinWheel() {
    if (isSpinning) return;
    if (gameState.freedom < 1) {
        showToast("You need at least 1 Freedom Spin to play!");
        return;
    }

    // Consume 1 spin immediately
    gameState.freedom--;
    saveGameState();
    updateSpinsDisplay();

    isSpinning = true;
    const spinBtn = document.getElementById('spin-btn');
    if (spinBtn) spinBtn.disabled = true;

    // Hide previous result
    document.getElementById('result-area').classList.add('hidden');

    // Random spin: 6-10 full rotations + random landing
    const minSpins = 6;
    const maxSpins = 10;
    const extraSpins = Math.random() * (maxSpins - minSpins) + minSpins;
    const targetSegment = Math.floor(Math.random() * segments.length);
    const segmentAngle = 360 / segments.length;
    const targetAngle = 360 - (targetSegment * segmentAngle) - (segmentAngle / 2); // Center of segment

    const totalRotation = (extraSpins * 360) + targetAngle;
    const startTime = Date.now();
    const duration = 4200; // 4.2 seconds

    function animate() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        // Easing: strong ease-out
        const eased = 1 - Math.pow(1 - progress, 4);
        
        currentRotation = (currentRotation + (totalRotation * eased / 10)) % 360; // Smooth continuous
        
        drawWheel();

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            // Final exact position
            currentRotation = targetAngle % 360;
            drawWheel();
            
            // Determine landed segment
            const landedIndex = Math.floor(((360 - currentRotation) % 360) / segmentAngle);
            const prize = segments[landedIndex];
            
            // Award prize
            awardPrize(prize);
            
            isSpinning = false;
            if (spinBtn) spinBtn.disabled = gameState.freedom < 1;
            updateSpinsDisplay();
        }
    }

    animate();
}

function awardPrize(prize) {
    let rewardText = "";
    let icon = "";

    switch (prize.type) {
        case "coins":
            gameState.heroCoins += prize.amount;
            rewardText = `+${prize.amount.toLocaleString()} HERO COINS`;
            icon = "🪙";
            break;
        case "stars":
            gameState.stars += prize.amount;
            rewardText = `+${prize.amount} STARS`;
            icon = "⭐";
            break;
        case "freedom":
            gameState.freedom += prize.amount;
            rewardText = `+${prize.amount} FREEDOM SPINS`;
            icon = "🌀";
            break;
        case "torpedoes":
            gameState.torpedoes += prize.amount;
            rewardText = `+${prize.amount} TORPEDO`;
            icon = "🧨";
            break;
    }

    saveGameState();

    // Show result
    const resultArea = document.getElementById('result-area');
    const iconEl = document.getElementById('result-icon');
    const titleEl = document.getElementById('result-title');
    const subEl = document.getElementById('result-subtitle');

    iconEl.innerHTML = icon;
    titleEl.innerHTML = rewardText;
    subEl.innerHTML = "Added to your account instantly!";

    resultArea.classList.remove('hidden');

    // Confetti for big wins
    if (prize.amount >= 3 || prize.type === "freedom") {
        launchConfetti();
    }

    // Auto-hide result after 3.5s
    setTimeout(() => {
        if (!isSpinning) {
            resultArea.classList.add('hidden');
        }
    }, 3500);
}

function launchConfetti() {
    const colors = ['#10b981', '#eab308', '#3b82f6', '#ef4444'];
    for (let i = 0; i < 45; i++) {
        setTimeout(() => {
            const conf = document.createElement('div');
            conf.style.position = 'fixed';
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.top = '-20px';
            conf.style.width = '10px';
            conf.style.height = '10px';
            conf.style.background = colors[Math.floor(Math.random() * colors.length)];
            conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            conf.style.zIndex = '9999';
            conf.style.pointerEvents = 'none';
            document.body.appendChild(conf);

            const fallTime = Math.random() * 1800 + 2200;
            conf.animate([
                { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                { transform: `translateY(${window.innerHeight + 100}px) rotate(${Math.random()*720 + 360}deg)`, opacity: 0 }
            ], {
                duration: fallTime,
                easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)'
            }).onfinish = () => conf.remove();
        }, i * 12);
    }
}

function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-xl flex items-center gap-x-2 text-sm z-50';
    toast.innerHTML = `<i class="fa-solid fa-exclamation-triangle text-yellow-400"></i> <span>${msg}</span>`;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.transition = 'all 0.3s ease';
        toast.style.opacity = '0';
        toast.style.transform = 'translate(-50%, 20px)';
        setTimeout(() => toast.remove(), 300);
    }, 2200);
}

function saveAndReturn() {
    saveGameState();
    window.location.href = 'index.html';
}

// Initialize
function init() {
    loadGameState();
    drawWheel();
    updateSpinsDisplay();

    // Keyboard support (Space to spin)
    document.addEventListener('keydown', function(e) {
        if (e.key === ' ' && !isSpinning) {
            e.preventDefault();
            spinWheel();
        }
    });

    // Initial welcome toast
    setTimeout(() => {
        if (gameState.freedom > 0) {
            // Optional: showToast("Ready to spin for freedom?");
        }
    }, 800);
}

window.onload = init;
</script>
</html>
