<body class="bg-slate-950 text-white">

        <div id="wheel-screen">

<script>
// Shared game state (same as main app + Eagle Strike)
// ===============================
// INVENTORY / LOCALSTORAGE - START
// Shared Vets Rush inventory
// ===============================

function getInventory() {
    const saved = localStorage.getItem('vetsRushInventory');

    if (saved) {
        try {
            const inv = JSON.parse(saved);

            return {
                flags: inv.flags || 0,
                helmets: inv.helmets || 0,
                beds: inv.beds || 0,
                homes: inv.homes || 0,
                shields: inv.shields || 0,
                stars: inv.stars || 0,
                medals: inv.medals || 0,
                heroCoins: inv.heroCoins || 0,
                torpedoes: inv.torpedoes || 0,
                freedom: inv.freedom || 0
            };
        } catch (e) {}
    }

    return {
        flags: 0,
        helmets: 0,
        beds: 0,
        homes: 0,
        shields: 0,
        stars: 0,
        medals: 0,
        heroCoins: 0,
        torpedoes: 0,
        freedom: 0
    };
}

function saveInventory(inv) {
    localStorage.setItem('vetsRushInventory', JSON.stringify(inv));
}

// ===============================
// INVENTORY / LOCALSTORAGE - END
// ===============================
let gameState = {
    heroCoins: 3277350,
    stars: 0,
    torpedoes: 0,
    freedom: 3,
    valor: 0,
    flags: 0,
    helmets: 0,
    medals: 0,
    homes: 12,
    beds: 0
};

let isSpinning = false;
let currentRotation = 0;
const canvas = document.getElementById('freedom-wheel-canvas');
const ctx = canvas.getContext('2d', { alpha: true });

const segments = [
    { label: "500 🪙", type: "coins", amount: 500, color: "#eab308" },
    { label: "2 ⭐", type: "stars", amount: 2, color: "#3b82f6" },
    { label: "+2 🌀", type: "freedom", amount: 2, color: "#10b981" },
    { label: "1000 🪙", type: "coins", amount: 1000, color: "#eab308" },
    { label: "1 🧨", type: "torpedoes", amount: 1, color: "#ef4444" },
    { label: "+3 🌀", type: "freedom", amount: 3, color: "#10b981" },
    { label: "750 🪙", type: "coins", amount: 750, color: "#eab308" },
    { label: "5 ⭐", type: "stars", amount: 5, color: "#3b82f6" }
];

function loadGameState() {
    const saved = localStorage.getItem('vetsRushInventory');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            gameState = { ...gameState, ...parsed };
        } catch (e) {}
    }
    updateSpinsDisplay();
}

function saveGameState() {
    localStorage.setItem('vetsRushInventory', JSON.stringify(gameState));
}

function updateSpinsDisplay() {
    const el = document.getElementById('spins-left');
    if (el) el.innerText = gameState.freedom;
    
    const btn = document.getElementById('spin-btn');
    if (btn) {
        btn.disabled = gameState.freedom < 1;
        if (gameState.freedom < 1) {
            btn.innerHTML = `<i class="fa-solid fa-lock mr-2"></i> NO SPINS LEFT`;
        } else {
            btn.innerHTML = `<i class="fa-solid fa-sync fa-spin-pulse mr-2"></i> <span id="spin-btn-text">SPIN THE WHEEL</span>`;
        }
    }
}

function addTestSpins() {
    gameState.freedom = (gameState.freedom || 0) + 10;
    saveGameState();
    updateSpinsDisplay();

    const resultText = document.getElementById('result-text');
    if (resultText) {
        resultText.innerText = '+10 TEST SPINS ADDED';
    }
}

// ===============================
// NAVIGATION HELPERS - START
// Sends player back to the Vets Rush hub
// ===============================

function returnToHub() {
    window.location.href = 'index.html';
}

// ===============================
// NAVIGATION HELPERS - END
// ===============================

function drawWheel() {
    const centerX = 150;
    const centerY = 150;
    const radius = 130;
    const segmentAngle = (2 * Math.PI) / segments.length;

    ctx.clearRect(0, 0, 300, 300);

    for (let i = 0; i < segments.length; i++) {
        const startAngle = currentRotation + (i * segmentAngle);
        const endAngle = startAngle + segmentAngle;

        // Segment fill
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = segments[i].color;
        ctx.fill();

        // Segment border
        ctx.strokeStyle = "#1e2937";
        ctx.lineWidth = 3;
        ctx.stroke();

        // Label
        const midAngle = startAngle + (segmentAngle / 2);
        const textX = centerX + Math.cos(midAngle) * (radius * 0.65);
        const textY = centerY + Math.sin(midAngle) * (radius * 0.65);

        ctx.save();
        ctx.translate(textX, textY);
        ctx.rotate(midAngle + Math.PI / 2);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 13px Inter, system-ui";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = "rgba(0,0,0,0.6)";
        ctx.shadowBlur = 3;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;
        ctx.fillText(segments[i].label, 0, 0);
        ctx.restore();
    }

    // Inner ring
    ctx.beginPath();
    ctx.arc(centerX, centerY, 38, 0, Math.PI * 2);
    ctx.fillStyle = "#0f172a";
    ctx.fill();
    ctx.strokeStyle = "#64748b";
    ctx.lineWidth = 4;
    ctx.stroke();
}

function spinWheel() {
    if (isSpinning) return;
    if (gameState.freedom < 1) {
        showToast("You need at least 1 Freedom Spin to play!");
        return;
    }

    // Consume 1 spin immediately
    gameState.freedom--;
    saveGameState();
    updateSpinsDisplay();

    isSpinning = true;
    const spinBtn = document.getElementById('spin-btn');
    if (spinBtn) spinBtn.disabled = true;

    // Hide previous result
    document.getElementById('result-area').classList.add('hidden');

    // Random spin: 6-10 full rotations + random landing
    const minSpins = 6;
    const maxSpins = 10;
    const extraSpins = Math.random() * (maxSpins - minSpins) + minSpins;
    const targetSegment = Math.floor(Math.random() * segments.length);
    const segmentAngle = 360 / segments.length;
    const targetAngle = 360 - (targetSegment * segmentAngle) - (segmentAngle / 2); // Center of segment

    const totalRotation = (extraSpins * 360) + targetAngle;
    const startTime = Date.now();
    const duration = 4200; // 4.2 seconds

    function animate() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        // Easing: strong ease-out
        const eased = 1 - Math.pow(1 - progress, 4);
        
        currentRotation = (currentRotation + (totalRotation * eased / 10)) % 360; // Smooth continuous
        
        drawWheel();

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            // Final exact position
            currentRotation = targetAngle % 360;
            drawWheel();
            
            // Determine landed segment
            const landedIndex = Math.floor(((360 - currentRotation) % 360) / segmentAngle);
            const prize = segments[landedIndex];
            
            // Award prize
            awardPrize(prize);
            
            isSpinning = false;
            if (spinBtn) spinBtn.disabled = gameState.freedom < 1;
            updateSpinsDisplay();
        }
    }

    animate();
}

function awardPrize(prize) {
    let rewardText = "";
    let icon = "";

    switch (prize.type) {
        case "coins":
            gameState.heroCoins += prize.amount;
            rewardText = `+${prize.amount.toLocaleString()} HERO COINS`;
            icon = "🪙";
            break;
        case "stars":
            gameState.stars += prize.amount;
            rewardText = `+${prize.amount} STARS`;
            icon = "⭐";
            break;
        case "freedom":
            gameState.freedom += prize.amount;
            rewardText = `+${prize.amount} FREEDOM SPINS`;
            icon = "🌀";
            break;
        case "torpedoes":
            gameState.torpedoes += prize.amount;
            rewardText = `+${prize.amount} TORPEDO`;
            icon = "🧨";
            break;
    }

    saveGameState();

    // Show result
    const resultArea = document.getElementById('result-area');
    const iconEl = document.getElementById('result-icon');
    const titleEl = document.getElementById('result-title');
    const subEl = document.getElementById('result-subtitle');

    iconEl.innerHTML = icon;
    titleEl.innerHTML = rewardText;
    subEl.innerHTML = "Added to your account instantly!";

    resultArea.classList.remove('hidden');

    // Confetti for big wins
    if (prize.amount >= 3 || prize.type === "freedom") {
        launchConfetti();
    }

    // Auto-hide result after 3.5s
    setTimeout(() => {
        if (!isSpinning) {
            resultArea.classList.add('hidden');
        }
    }, 3500);
}

function launchConfetti() {
    const colors = ['#10b981', '#eab308', '#3b82f6', '#ef4444'];
    for (let i = 0; i < 45; i++) {
        setTimeout(() => {
            const conf = document.createElement('div');
            conf.style.position = 'fixed';
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.top = '-20px';
            conf.style.width = '10px';
            conf.style.height = '10px';
            conf.style.background = colors[Math.floor(Math.random() * colors.length)];
            conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            conf.style.zIndex = '9999';
            conf.style.pointerEvents = 'none';
            document.body.appendChild(conf);

            const fallTime = Math.random() * 1800 + 2200;
            conf.animate([
                { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                { transform: `translateY(${window.innerHeight + 100}px) rotate(${Math.random()*720 + 360}deg)`, opacity: 0 }
            ], {
                duration: fallTime,
                easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)'
            }).onfinish = () => conf.remove();
        }, i * 12);
    }
}

function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-xl flex items-center gap-x-2 text-sm z-50';
    toast.innerHTML = `<i class="fa-solid fa-exclamation-triangle text-yellow-400"></i> <span>${msg}</span>`;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.transition = 'all 0.3s ease';
        toast.style.opacity = '0';
        toast.style.transform = 'translate(-50%, 20px)';
        setTimeout(() => toast.remove(), 300);
    }, 2200);
}

function saveAndReturn() {
    saveGameState();
    window.location.href = 'index.html';
}

// Initialize
function init() {
    loadGameState();
    drawWheel();
    updateSpinsDisplay();

    // Keyboard support (Space to spin)
    document.addEventListener('keydown', function(e) {
        if (e.key === ' ' && !isSpinning) {
            e.preventDefault();
            spinWheel();
        }
    });

    // Initial welcome toast
    setTimeout(() => {
        if (gameState.freedom > 0) {
            // Optional: showToast("Ready to spin for freedom?");
        }
    }, 800);
}

window.onload = init;
</script>
