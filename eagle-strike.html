<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EAGLE STRIKE 🦅 | VETS RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #1e2937 100%);
            color: white;
        }
        
        .game-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            background: #0f172a;
            box-shadow: 0 0 0 12px #1e2937;
            border-radius: 24px;
            overflow: hidden;
        }
        
        #gameCanvas {
            width: 100%;
            height: 520px;
            display: block;
            background: linear-gradient(180deg, #1e40af 0%, #1e3a8a 100%);
            touch-action: manipulation;
        }
        
        .countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 30px rgba(255,255,255,0.8);
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="game-container">
        <!-- Header -->
        <div class="bg-slate-900 px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center">
                    <i class="fas fa-fighter-jet text-white text-2xl"></i>
                </div>
                <div>
                    <div class="font-bold text-xl">EAGLE STRIKE</div>
                    <div class="text-xs text-orange-400">VETS RUSH • SLOWER MODE</div>
                </div>
            </div>
            <div class="text-right">
                <div class="text-xs text-slate-400">HIGH SCORE</div>
                <div id="highScore" class="font-mono font-bold text-lg text-amber-400">18,750</div>
            </div>
        </div>

        <!-- Game Canvas -->
        <div class="relative">
            <canvas id="gameCanvas" width="420" height="520"></canvas>
            
            <!-- Countdown -->
            <div id="countdown" class="countdown hidden">3</div>
            
            <!-- Start Screen -->
            <div id="startScreen" class="absolute inset-0 bg-black/80 flex items-center justify-center">
                <div class="text-center">
                    <div class="text-6xl mb-4">🦅</div>
                    <div class="text-4xl font-bold mb-2">EAGLE STRIKE</div>
                    <div class="text-slate-400 mb-8">Protect the skies • Earn rewards</div>
                    
                    <button onclick="startMission()" 
                            class="bg-orange-500 hover:bg-orange-600 transition-colors text-white font-bold py-4 px-12 rounded-2xl text-xl shadow-lg">
                        START MISSION
                    </button>
                    
                    <div class="mt-6 text-xs text-slate-500">Tap & hold to climb • Release to dive</div>
                </div>
            </div>
            
            <!-- Game Over Screen -->
            <div id="gameOverScreen" class="absolute inset-0 bg-black/90 hidden flex items-center justify-center">
                <div class="text-center p-6 w-full max-w-[300px]">
                    <div class="text-6xl mb-4">💥</div>
                    <div class="text-3xl font-bold mb-2">MISSION FAILED</div>
                    <div class="text-slate-400 mb-6">Your F-16 was shot down</div>
                    
                    <div class="bg-slate-800 rounded-2xl p-4 mb-6 text-left">
                        <div class="flex justify-between mb-2">
                            <span class="text-sm text-slate-400">DISTANCE</span>
                            <span id="finalDistance" class="font-bold">1,240m</span>
                        </div>
                        <div class="flex justify-between mb-2">
                            <span class="text-sm text-slate-400">MEDALS COLLECTED</span>
                            <span id="finalMedals" class="font-bold text-amber-400">12</span>
                        </div>
                        <div class="flex justify-between mb-2">
                            <span class="text-sm text-slate-400">ENEMIES DESTROYED</span>
                            <span id="finalKills" class="font-bold">8</span>
                        </div>
                        <div class="border-t border-slate-700 my-2"></div>
                        <div class="flex justify-between text-lg">
                            <span class="font-bold">REWARDS</span>
                            <span id="finalReward" class="font-bold text-emerald-400">+2,450 🪙 +3 ⭐</span>
                        </div>
                    </div>
                    
                    <button onclick="claimRewards()" 
                            class="bg-emerald-500 hover:bg-emerald-600 transition-colors text-white font-bold py-3 px-8 rounded-2xl text-lg shadow-lg w-full mb-3">
                        CLAIM REWARDS
                    </button>
                    
                    <button onclick="window.location.href = window.location.origin" 
                            class="bg-emerald-600 hover:bg-emerald-700 transition-colors text-white font-bold py-3 px-8 rounded-2xl text-lg w-full">
                        RETURN TO VETS RUSH
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Controls -->
        <div class="bg-slate-900 p-4">
            <div class="flex gap-3">
                <button id="climbBtn" 
                        class="flex-1 bg-yellow-500 hover:bg-yellow-600 active:bg-yellow-700 text-white font-bold py-4 rounded-2xl text-xl shadow-lg flex items-center justify-center gap-2"
                        onmousedown="climbPressed = true" 
                        onmouseup="climbPressed = false"
                        ontouchstart="climbPressed = true" 
                        ontouchend="climbPressed = false">
                    <i class="fas fa-arrow-up text-2xl"></i>
                    <span>CLIMB</span>
                </button>
                
                <button onclick="restartMission()" 
                        class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 px-6 rounded-2xl text-lg">
                    <i class="fas fa-redo"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let player = { x: 80, y: 260, vy: 0, size: 28, shield: 0 };
        let missiles = [];
        let enemies = [];
        let powerUps = [];
        let particles = [];
        let gameRunning = false;
        let score = 0;
        let distance = 0;
        let medals = 0;
        let kills = 0;
        let lastEnemyTime = 0;
        let lastMissileTime = 0;
        let climbPressed = false;
        let doubleFire = false;
        let doubleFireTime = 0;
        
        let highScore = localStorage.getItem('eagleStrikeHighScore') || 18750;
        document.getElementById('highScore').innerText = highScore.toLocaleString();
        
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // F-16 Body
            ctx.fillStyle = '#e2e8f0';
            ctx.beginPath();
            ctx.moveTo(0, -8);
            ctx.lineTo(22, -4);
            ctx.lineTo(26, 0);
            ctx.lineTo(22, 4);
            ctx.lineTo(0, 8);
            ctx.closePath();
            ctx.fill();
            
            // Wings
            ctx.fillStyle = '#94a3b8';
            ctx.beginPath();
            ctx.moveTo(8, -2);
            ctx.lineTo(-6, -14);
            ctx.lineTo(-4, -2);
            ctx.closePath();
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(8, 2);
            ctx.lineTo(-6, 14);
            ctx.lineTo(-4, 2);
            ctx.closePath();
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = '#1e40af';
            ctx.beginPath();
            ctx.ellipse(12, 0, 5, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Afterburner glow
            if (climbPressed) {
                ctx.fillStyle = '#fbbf24';
                ctx.beginPath();
                ctx.moveTo(-2, -3);
                ctx.lineTo(-12, 0);
                ctx.lineTo(-2, 3);
                ctx.closePath();
                ctx.fill();
            }
            
            // Shield
            if (player.shield > 0) {
                ctx.strokeStyle = '#60a5fa';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(8, 0, 22, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            ctx.restore();
        }
        
        function drawMissile(m) {
            ctx.save();
            ctx.translate(m.x, m.y);
            ctx.rotate(m.angle || 0);
            
            ctx.fillStyle = '#f97316';
            ctx.fillRect(-6, -2, 14, 4);
            
            // Glow
            ctx.fillStyle = '#fed7aa';
            ctx.fillRect(-2, -1, 6, 2);
            
            ctx.restore();
        }
        
        function drawEnemy(e) {
            ctx.save();
            ctx.translate(e.x, e.y);
            
            if (e.type === 'drone') {
                // Red Drone
                ctx.fillStyle = '#ef4444';
                ctx.beginPath();
                ctx.arc(0, 0, 13, 0, Math.PI * 2);
                ctx.fill();
                
                // Rotors
                ctx.strokeStyle = '#b91c1c';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-10, -10);
                ctx.lineTo(10, 10);
                ctx.moveTo(-10, 10);
                ctx.lineTo(10, -10);
                ctx.stroke();
                
                ctx.fillStyle = '#fef08c';
                ctx.beginPath();
                ctx.arc(0, 0, 4, 0, Math.PI * 2);
                ctx.fill();
                
            } else if (e.type === 'fighter') {
                // Red Fighter Jet
                ctx.fillStyle = '#dc2626';
                ctx.beginPath();
                ctx.moveTo(0, -7);
                ctx.lineTo(18, 0);
                ctx.lineTo(0, 7);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#991b1b';
                ctx.beginPath();
                ctx.moveTo(4, -4);
                ctx.lineTo(-8, -12);
                ctx.lineTo(-6, -4);
                ctx.closePath();
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(4, 4);
                ctx.lineTo(-8, 12);
                ctx.lineTo(-6, 4);
                ctx.closePath();
                ctx.fill();
                
            } else if (e.type === 'helicopter') {
                // Green Helicopter
                ctx.fillStyle = '#22c55e';
                ctx.fillRect(-10, -6, 20, 12);
                
                // Rotor
                ctx.strokeStyle = '#15803d';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(-14, -8);
                ctx.lineTo(14, -8);
                ctx.stroke();
                
                ctx.fillStyle = '#4ade80';
                ctx.beginPath();
                ctx.arc(0, -8, 3, 0, Math.PI * 2);
                ctx.fill();
                
            } else if (e.type === 'bomber') {
                // Dark Bomber
                ctx.fillStyle = '#475569';
                ctx.beginPath();
                ctx.ellipse(0, 0, 18, 9, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#334155';
                ctx.beginPath();
                ctx.moveTo(-8, -5);
                ctx.lineTo(-18, 0);
                ctx.lineTo(-8, 5);
                ctx.closePath();
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        function drawPowerUp(p) {
            ctx.save();
            ctx.translate(p.x, p.y);
            
            if (p.type === 'shield') {
                ctx.fillStyle = '#3b82f6';
                ctx.beginPath();
                ctx.arc(0, 0, 11, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#93c5fd';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 14, 0, Math.PI * 2);
                ctx.stroke();
            } else {
                ctx.fillStyle = '#eab308';
                ctx.beginPath();
                ctx.arc(0, 0, 11, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#fef08c';
                ctx.font = 'bold 14px Inter';
                ctx.textAlign = 'center';
                ctx.fillText('×2', 0, 5);
            }
            
            ctx.restore();
        }
        
        function update() {
            if (!gameRunning) return;
            
            // Player movement (SLOWER)
            if (climbPressed) {
                player.vy = Math.max(player.vy - 0.55, -4.5);
            } else {
                player.vy = Math.min(player.vy + 0.45, 4);
            }
            
            player.y += player.vy;
            player.y = Math.max(50, Math.min(470, player.y));
            
            // Update shield
            if (player.shield > 0) player.shield--;
            
            // Update distance (SLOWER)
            distance += 0.75;
            
            // Spawn enemies (MUCH SLOWER)
            if (Date.now() - lastEnemyTime > 1150) {
                createEnemy();
                lastEnemyTime = Date.now();
                
                // Occasionally spawn a second enemy (less often)
                if (Math.random() < 0.22) {
                    setTimeout(() => {
                        if (gameRunning) createEnemy();
                    }, 380);
                }
            }
            
            // Spawn power-ups (slightly less often)
            if (Math.random() < 0.0065) {
                createPowerUp();
            }
            
            // Update enemies (SLOWER)
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.x += e.vx * 0.72;
                e.y += e.vy * 0.72;
                
                // Remove off-screen
                if (e.x < -30) {
                    enemies.splice(i, 1);
                    continue;
                }
                
                // Simple AI for helicopter
                if (e.type === 'helicopter') {
                    e.vy = Math.sin(Date.now() / 400) * 1.1;
                }
                
                // Check collision with player
                const dist = Math.hypot(e.x - player.x, e.y - player.y);
                if (dist < 26) {
                    if (player.shield > 0) {
                        createParticle(e.x, e.y, '#60a5fa');
                        enemies.splice(i, 1);
                    } else {
                        gameOver();
                        return;
                    }
                }
            }
            
            // Update missiles (SLOWER)
            for (let i = missiles.length - 1; i >= 0; i--) {
                const m = missiles[i];
                m.x += 5.5;
                
                if (m.x > 450) {
                    missiles.splice(i, 1);
                    continue;
                }
                
                // Check hits
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    const dist = Math.hypot(m.x - e.x, m.y - e.y);
                    
                    if (dist < 22) {
                        createParticle(e.x, e.y, '#f97316');
                        enemies.splice(j, 1);
                        missiles.splice(i, 1);
                        kills++;
                        score += 85;
                        break;
                    }
                }
            }
            
            // Update power-ups
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const p = powerUps[i];
                p.x -= 2.8;
                
                if (p.x < -30) {
                    powerUps.splice(i, 1);
                    continue;
                }
                
                const dist = Math.hypot(p.x - player.x, p.y - player.y);
                if (dist < 26) {
                    if (p.type === 'shield') {
                        player.shield = 280;
                        createParticle(p.x, p.y, '#60a5fa');
                    } else {
                        doubleFire = true;
                        doubleFireTime = Date.now() + 8500;
                        createParticle(p.x, p.y, '#eab308');
                    }
                    powerUps.splice(i, 1);
                }
            }
            
            // Double fire timeout
            if (doubleFire && Date.now() > doubleFireTime) {
                doubleFire = false;
            }
            
            // Auto-fire missiles (SLOWER)
            if (Date.now() - lastMissileTime > 420) {
                missiles.push({
                    x: player.x + 18,
                    y: player.y - 3,
                    angle: -0.1
                });
                
                if (doubleFire) {
                    missiles.push({
                        x: player.x + 18,
                        y: player.y + 3,
                        angle: 0.1
                    });
                }
                
                lastMissileTime = Date.now();
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vx *= 0.96;
                p.vy *= 0.96;
                
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            // Check if player hit bottom or top
            if (player.y <= 50 || player.y >= 470) {
                if (player.shield <= 0) {
                    gameOver();
                    return;
                }
            }
            
            draw();
            requestAnimationFrame(update);
        }
        
        function draw() {
            ctx.clearRect(0, 0, 420, 520);
            
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, 520);
            gradient.addColorStop(0, '#1e40af');
            gradient.addColorStop(0.4, '#1e3a8a');
            gradient.addColorStop(1, '#0f172a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 420, 520);
            
            // Clouds
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            for (let i = 0; i < 5; i++) {
                const x = ((Date.now() / 40) + i * 90) % 520 - 60;
                ctx.beginPath();
                ctx.ellipse(x, 80 + i * 70, 45, 18, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw player
            drawPlayer();
            
            // Draw missiles
            missiles.forEach(m => drawMissile(m));
            
            // Draw enemies
            enemies.forEach(e => drawEnemy(e));
            
            // Draw power-ups
            powerUps.forEach(p => drawPowerUp(p));
            
            // Draw particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            
            // HUD
            ctx.fillStyle = 'white';
            ctx.font = 'bold 18px Inter';
            ctx.fillText(`SCORE: ${score}`, 20, 35);
            ctx.fillText(`DIST: ${Math.floor(distance)}m`, 20, 58);
            
            // Medals
            ctx.fillStyle = '#fbbf24';
            ctx.fillText(`★ ${medals}`, 320, 35);
            
            // Lives
            ctx.fillStyle = '#ef4444';
            for (let i = 0; i < 3; i++) {
                ctx.fillText('♥', 320 + i * 22, 58);
            }
            
            // Shield indicator
            if (player.shield > 0) {
                ctx.fillStyle = '#60a5fa';
                ctx.font = 'bold 14px Inter';
                ctx.fillText('SHIELD', 20, 82);
            }
        }
        
        function createEnemy() {
            const types = ['drone', 'fighter', 'helicopter', 'bomber'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            let enemy = {
                x: 480,
                y: Math.random() * 400 + 60,
                type: type,
                health: 1,
                vx: -1.9,
                vy: 0,
                size: 28,
                angle: 0
            };
            
            if (type === 'drone') {
                enemy.size = 26;
                enemy.vx = -2.1;
            } else if (type === 'fighter') {
                enemy.size = 32;
                enemy.vx = -2.4;
            } else if (type === 'helicopter') {
                enemy.size = 30;
                enemy.vx = -1.7;
                enemy.vy = Math.random() * 1.2 + 0.6;
            } else if (type === 'bomber') {
                enemy.size = 38;
                enemy.vx = -1.4;
                enemy.health = 2;
            }
            
            enemies.push(enemy);
        }
        
        function createPowerUp() {
            const types = ['shield', 'double'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            powerUps.push({
                x: 480,
                y: Math.random() * 380 + 70,
                type: type,
                size: 22
            });
        }
        
        function createParticle(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 3.5,
                    vy: (Math.random() - 0.5) * 3.5,
                    life: 18 + Math.random() * 12,
                    color: color,
                    size: Math.random() * 3 + 2
                });
            }
        }
        
        function startMission() {
            document.getElementById('startScreen').classList.add('hidden');
            
            // Reset
            player = { x: 80, y: 260, vy: 0, size: 28, shield: 280 };
            missiles = [];
            enemies = [];
            powerUps = [];
            particles = [];
            score = 0;
            distance = 0;
            medals = 0;
            kills = 0;
            climbPressed = false;
            doubleFire = false;
            
            // Countdown
            const countdownEl = document.getElementById('countdown');
            countdownEl.classList.remove('hidden');
            countdownEl.innerText = '3';
            
            let count = 3;
            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.innerText = count;
                } else {
                    countdownEl.innerText = 'GO!';
                    setTimeout(() => {
                        countdownEl.classList.add('hidden');
                        gameRunning = true;
                        lastEnemyTime = Date.now();
                        lastMissileTime = Date.now();
                        update();
                    }, 420);
                    clearInterval(interval);
                }
            }, 720);
        }
        
        function gameOver() {
            gameRunning = false;
            
            const finalDistance = Math.floor(distance);
            const finalMedals = medals;
            const finalKills = kills;
            const rewardCoins = Math.floor(finalDistance * 1.8) + (finalKills * 45);
            const rewardStars = Math.floor(finalMedals / 3) + 1;
            
            document.getElementById('finalDistance').innerText = finalDistance + 'm';
            document.getElementById('finalMedals').innerText = finalMedals;
            document.getElementById('finalKills').innerText = finalKills;
            document.getElementById('finalReward').innerText = `+${rewardCoins} 🪙 +${rewardStars} ⭐`;
            
            document.getElementById('gameOverScreen').classList.remove('hidden');
            
            // Save high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('eagleStrikeHighScore', highScore);
                document.getElementById('highScore').innerText = highScore.toLocaleString();
            }
        }
        
        function claimRewards() {
            const rewardCoins = parseInt(document.getElementById('finalReward').innerText.match(/\d+/)[0]) || 0;
            const rewardStars = parseInt(document.getElementById('finalReward').innerText.match(/\d+ ⭐/)[0]) || 0;
            
            // Save pending rewards for main game
            localStorage.setItem('pendingEagleRewards', JSON.stringify({
                heroCoins: rewardCoins,
                stars: rewardStars
            }));
            
            // Go back to main game
            window.location.href = window.location.origin;
        }
        
        function restartMission() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            startMission();
        }
        
        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                climbPressed = true;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                climbPressed = false;
            }
        });
        
        // Touch anywhere to climb (alternative control)
        canvas.addEventListener('touchstart', () => {
            if (gameRunning) climbPressed = true;
        });
        
        canvas.addEventListener('touchend', () => {
            if (gameRunning) climbPressed = false;
        });
        
        // Initial high score
        console.log('%c[Eagle Strike v5] Slower version loaded successfully', 'color:#64748b');
    </script>
</body>
</html>
