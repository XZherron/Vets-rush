<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PATRIOT FLEET • VETS RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="game-state.js"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); color: white; }
        .fleet-cell {
            width: 52px; height: 52px;
            background: #1e2937;
            border: 3px solid #475569;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.9rem;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        .fleet-cell:hover { background: #334155; }
        .fleet-cell.hit { background: #ef4444; border-color: #b91c1c; }
        .fleet-cell.miss { background: #3b82f6; border-color: #1e40af; }
        .fleet-cell.sunk { background: #eab308; border-color: #ca8a04; }
    </style>
</head>
<body class="bg-slate-950 text-white">

    <div class="bg-slate-900 border-b border-slate-700 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-x-3">
            <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-2xl">🚢</div>
            <div>
                <div class="font-bold text-2xl">PATRIOT FLEET</div>
                <div class="text-xs text-slate-400 -mt-1">LEVEL <span id="fleet-level">1</span> • Sink all subs</div>
            </div>
        </div>
        <div onclick="returnToBase()" class="bg-slate-800 hover:bg-slate-700 px-4 py-1.5 rounded-2xl flex items-center gap-x-2 text-sm cursor-pointer">
            <i class="fa-solid fa-arrow-left"></i>
            <span>RETURN TO BASE</span>
        </div>
    </div>

    <div class="px-4 py-3 bg-slate-900 flex justify-between items-center border-b border-slate-700">
        <div class="flex items-center gap-x-4">
            <div class="text-sm">SHOTS LEFT: <span id="fleet-shots" class="font-bold text-yellow-400">∞</span></div>
            <div class="text-sm text-emerald-400" id="fleet-sunk">SUNK: 0/3</div>
        </div>
        <div class="text-xs text-slate-400">Torpedoes from inventory</div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <div class="bg-slate-900 rounded-3xl p-4 border border-slate-700">
            <div class="grid grid-cols-6 gap-2 mb-4" id="fleet-grid" style="max-width: 320px; margin: 0 auto;"></div>

            <div id="fleet-complete" class="hidden text-center py-4">
                <div class="text-2xl font-bold text-emerald-400 mb-2">LEVEL COMPLETE!</div>
                <div class="text-sm text-slate-300 mb-4" id="fleet-reward-text"></div>
                <button onclick="startNextLevel()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-2xl">PLAY NEXT LEVEL</button>
            </div>
        </div>
    </div>

    <script>
        let fleetLevel = 1;
        let fleetSubs = [];
        let fleetHits = 0;
        let fleetShotsLeft = 9999;   // INFINITE TORPEDOES FOR TESTING

        function initPatriotFleet() {
            if (window.VetsRush && typeof window.VetsRush.loadGame === 'function') {
                window.VetsRush.loadGame();
            }

            const grid = document.getElementById('fleet-grid');
            grid.innerHTML = '';

            for (let i = 0; i < 36; i++) {
                const cell = document.createElement('div');
                cell.className = 'fleet-cell';
                cell.dataset.index = i;
                cell.onclick = () => fireTorpedo(i, cell);
                grid.appendChild(cell);
            }

            placeSubs();

            // Pull from game-state.js if available, otherwise use high number for testing
            if (window.VetsRush && window.VetsRush.game && typeof window.VetsRush.game.torpedoes === 'number' && window.VetsRush.game.torpedoes > 0) {
                fleetShotsLeft = window.VetsRush.game.torpedoes;
            } else {
                fleetShotsLeft = 9999;   // High number for testing
            }

            document.getElementById('fleet-level').innerText = fleetLevel;
            updateFleetUI();
        }

        function placeSubs() {
            fleetSubs = [];
            const placed = new Set();
            let numSubs = 3 + Math.floor((fleetLevel - 1) / 2);
            if (numSubs > 6) numSubs = 6;

            for (let s = 0; s < numSubs; s++) {
                let length = (s % 2 === 0) ? 3 : 2;
                let placedOk = false;
                let attempts = 0;

                while (!placedOk && attempts < 100) {
                    attempts++;
                    const isHorizontal = Math.random() > 0.5;
                    const start = Math.floor(Math.random() * 36);
                    let positions = [];
                    let valid = true;

                    for (let i = 0; i < length; i++) {
                        let pos = isHorizontal ? start + i : start + i * 6;
                        if (pos >= 36 || placed.has(pos)) { valid = false; break; }
                        positions.push(pos);
                    }
                    if (!valid) continue;

                    let tooClose = false;
                    for (let pos of positions) {
                        const neighbors = getAdjacentCells(pos);
                        for (let n of neighbors) {
                            if (placed.has(n)) { tooClose = true; break; }
                        }
                        if (tooClose) break;
                    }

                    if (!tooClose) {
                        positions.forEach(p => placed.add(p));
                        fleetSubs.push({ positions, hits: 0, length });
                        placedOk = true;
                    }
                }
            }
        }

        function getAdjacentCells(pos) {
            const row = Math.floor(pos / 6);
            const col = pos % 6;
            const neighbors = [];
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 6 && c >= 0 && c < 6) neighbors.push(r * 6 + c);
                }
            }
            return neighbors;
        }

        function fireTorpedo(index, cell) {
            if (fleetShotsLeft <= 0) {
                alert("Out of torpedoes!");
                return;
            }

            fleetShotsLeft--;
            document.getElementById('fleet-shots').innerText = fleetShotsLeft;

            if (window.VetsRush && typeof window.VetsRush.spend === 'function') {
                window.VetsRush.spend('torpedoes', 1);
            } else if (window.VetsRush && window.VetsRush.game) {
                window.VetsRush.game.torpedoes = Math.max(0, (window.VetsRush.game.torpedoes || 0) - 1);
                if (typeof window.VetsRush.saveGame === 'function') window.VetsRush.saveGame();
            }

            let hit = false;
            for (let sub of fleetSubs) {
                if (sub.positions.includes(index) && sub.hits < sub.length) {
                    hit = true;
                    sub.hits++;
                    cell.classList.add('hit');

                    if (sub.hits === sub.length) {
                        cell.style.background = '#eab308';
                        cell.innerHTML = '💥';
                        sub.positions.forEach(p => {
                            const c = document.querySelector(`[data-index="${p}"]`);
                            if (c) {
                                c.classList.add('sunk');
                                c.style.background = '#eab308';
                                c.innerHTML = '💥';
                            }
                        });
                        fleetHits++;
                    } else {
                        cell.style.background = '#f97316';
                        cell.innerHTML = '🔥';
                    }
                    break;
                }
            }

            if (!hit) {
                cell.classList.add('miss');
                cell.style.background = '#3b82f6';
                cell.innerHTML = '🌊';
            }

            updateFleetUI();

            if (fleetHits >= fleetSubs.length) {
                setTimeout(() => completeLevel(), 500);
            } else if (fleetShotsLeft <= 0) {
                setTimeout(() => alert("Out of shots!"), 600);
            }
        }

        function updateFleetUI() {
		    document.getElementById('fleet-shots').innerText = fleetShotsLeft;
		    document.getElementById('fleet-sunk').innerText = "SUNK: " + fleetHits + "/" + fleetSubs.length;
		}

        function completeLevel() {
		    const reward = 8500 + (fleetLevel * 2500) + (fleetShotsLeft * 300);
		    const stars = Math.floor(fleetLevel / 2) + 1;
		    const torpedoes = Math.floor(fleetLevel / 3) + 1;
		
		    if (window.VetsRush && typeof window.VetsRush.addReward === 'function') {
		        window.VetsRush.addReward('heroCoins', reward);
		        window.VetsRush.addReward('stars', stars);
		        window.VetsRush.addReward('torpedoes', torpedoes);
		    }
		
		    const completeScreen = document.getElementById('fleet-complete');
		    const rewardText = document.getElementById('fleet-reward-text');
		
		    completeScreen.classList.remove('hidden');
		    rewardText.innerHTML = "Excellent work, Patriot!<br>+" + reward.toLocaleString() + " Hero Coins<br>+" + stars + " ⭐ +" + torpedoes + "x 🧨";
		}

        function startNextLevel() {
		    fleetLevel++;
		    fleetHits = 0;
		    fleetShotsLeft = 9999;   // ← ADD THIS LINE
		    document.getElementById('fleet-level').innerText = fleetLevel;
		    document.getElementById('fleet-complete').classList.add('hidden');
		    initPatriotFleet();
		}

        function returnToBase() {
            if (window.VetsRush && typeof window.VetsRush.saveGame === 'function') {
                window.VetsRush.saveGame();
            }
            window.location.href = 'https://s-rush.vercel.app/';
        }

        window.onload = function() {
            initPatriotFleet();
        };
    </script>
</body>
</html>
