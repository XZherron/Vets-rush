<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HERO CRUSH • VETS RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="game-state.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        
        .crush-tile {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: grab;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            user-select: none;
            border-radius: 10px;
            background: #1e2937;
            border: 2px solid #475569;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
        }
        
        .crush-tile:active {
            transform: scale(0.95);
            box-shadow: 0 0 0 4px #dc2626;
        }
        
        .crush-tile.matched {
            animation: pop 0.3s ease forwards;
        }
        
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }
        
        .crush-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            background: #0f172a;
            padding: 12px;
            border-radius: 20px;
            border: 4px solid #475569;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
        
        .game-container {
            max-width: 420px;
            margin: 0 auto;
        }
        
        .stat-box {
            background: #1e2937;
            border: 2px solid #475569;
            border-radius: 12px;
        }
        
        .combo-text {
            position: absolute;
            font-weight: 700;
            color: #fbbf24;
            text-shadow: 0 0 10px #fbbf24;
            pointer-events: none;
            animation: comboPop 0.8s ease forwards;
        }
        
        @keyframes comboPop {
            0% { transform: scale(0.5); opacity: 1; }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); opacity: 0; }
        }
        
        .hero-crush-header {
            background: linear-gradient(to right, #dc2626, #b91c1c);
        }
    </style>
</head>
<body class="bg-slate-950 text-white pb-20">
    <!-- Header -->
    <div class="bg-slate-900 border-b border-slate-700 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-x-3">
            <button onclick="returnToBase()" class="text-slate-400 hover:text-white">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </button>
            <div>
                <div class="font-bold text-2xl tracking-tighter text-red-500">HERO CRUSH</div>
                <div class="text-[10px] text-slate-400 -mt-1">MATCH FOR GLORY • VETS RUSH</div>
            </div>
        </div>
        <div class="flex items-center gap-x-2">
            <div class="bg-slate-800 px-3 py-1 rounded-2xl flex items-center gap-x-2 text-sm">
                <i class="fa-solid fa-globe text-emerald-400"></i>
                <span class="font-mono">11.5M</span>
            </div>
        </div>
    </div>

    <!-- User Bar -->
    <div class="px-4 py-3 bg-slate-900 flex items-center justify-between border-b border-slate-700">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-yellow-500 rounded-full flex items-center justify-center text-xl">🪖</div>
            <div>
                <div class="font-bold" id="player-name">PatriotVet69</div>
                <div class="text-xs text-slate-400">LVL 14 • Rank #8,472</div>
            </div>
        </div>
        <div class="text-right">
            <div class="font-mono text-xl font-bold text-yellow-400" id="hero-coins">3,277,350</div>
            <div class="text-[10px] text-slate-400">HERO COINS 🪙</div>
        </div>
    </div>

    <!-- Game Stats -->
    <div class="px-4 pt-4">
        <div class="flex justify-between items-center mb-3">
            <div class="stat-box px-4 py-2 flex items-center gap-x-3">
                <div>
                    <div class="text-[10px] text-slate-400">MOVES LEFT</div>
                    <div class="text-3xl font-bold text-emerald-400" id="moves-left">30</div>
                </div>
                <i class="fa-solid fa-bomb text-3xl text-emerald-400"></i>
            </div>
            
            <div class="stat-box px-4 py-2 text-center">
                <div class="text-[10px] text-slate-400">SCORE</div>
                <div class="text-3xl font-bold text-yellow-400" id="score">0</div>
            </div>
            
            <div class="stat-box px-4 py-2 flex items-center gap-x-3">
                <div class="text-right">
                    <div class="text-[10px] text-slate-400">HIGH SCORE</div>
                    <div class="text-3xl font-bold text-orange-400" id="high-score">0</div>
                </div>
                <i class="fa-solid fa-trophy text-3xl text-orange-400"></i>
            </div>
        </div>
    </div>

    <!-- Game Grid -->
    <div class="px-4">
        <div class="game-container mx-auto">
            <div id="crush-grid" class="crush-grid mx-auto"></div>
            
            <div class="mt-4 flex justify-center gap-3">
                <button onclick="reshuffleBoard()" 
                        class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-2xl flex items-center justify-center gap-x-2 text-sm">
                    <i class="fa-solid fa-sync"></i>
                    <span>RESHUFFLE</span>
                </button>
                
                <button onclick="endGame()" 
                        class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-2xl flex items-center justify-center gap-x-2 text-sm">
                    <i class="fa-solid fa-flag"></i>
                    <span>END GAME</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Instructions -->
    <div class="px-4 mt-4 text-center">
        <div class="text-xs text-slate-400">
            Drag or tap adjacent tiles to swap • Match 3+ in a row or column
        </div>
    </div>

    <!-- Return Button -->
    <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50">
        <button onclick="returnToBase()" 
                class="bg-gradient-to-r from-red-600 to-blue-600 text-white font-bold px-8 py-3 rounded-3xl flex items-center justify-center gap-x-3 text-sm shadow-xl">
            <i class="fa-solid fa-home"></i>
            <span>RETURN TO BASE</span>
        </button>
    </div>

    <script>
        // Tailwind script
        function initTailwind() {
            document.documentElement.style.setProperty('--accent-red', '#dc2626');
        }
        
        // Game constants
        const GRID_SIZE = 8;
        const ICONS = ['🇺🇸', '🪖', '🎖️', '🦅', '⭐', '🛡️', '🔥'];
        let grid = [];
        let score = 0;
        let movesLeft = 30;
        let isProcessing = false;
        let selectedTile = null;
        let highScore = 0;
        
        // Load shared game state
        let gameState = {
            heroCoins: 3277350,
            stars: 0,
            flags: 0,
            medals: 0,
            homes: 12,
            torpedoes: 0,
            freedom: 0,
            valor: 0
        };
        
        function loadGameState() {
            const saved = localStorage.getItem('vetsRushGameState');
            if (saved) {
                gameState = JSON.parse(saved);
            }
            
            // Update UI
            document.getElementById('hero-coins').textContent = gameState.heroCoins.toLocaleString();
            document.getElementById('player-name').textContent = 'PatriotVet69';
            
            // Load high score
            const savedHigh = localStorage.getItem('heroCrushHighScore');
            if (savedHigh) highScore = parseInt(savedHigh);
            document.getElementById('high-score').textContent = highScore.toLocaleString();
        }
        
        function saveGameState() {
            localStorage.setItem('vetsRushGameState', JSON.stringify(gameState));
            localStorage.setItem('heroCrushHighScore', highScore);
        }
        
        // Create initial grid
        function createGrid() {
            grid = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                grid[r] = [];
                for (let c = 0; c < GRID_SIZE; c++) {
                    grid[r][c] = ICONS[Math.floor(Math.random() * ICONS.length)];
                }
            }
            
            // Ensure no initial matches
            while (hasMatches()) {
                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        grid[r][c] = ICONS[Math.floor(Math.random() * ICONS.length)];
                    }
                }
            }
        }
        
        function hasMatches() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const icon = grid[r][c];
                    
                    // Horizontal
                    if (c < GRID_SIZE - 2 && grid[r][c+1] === icon && grid[r][c+2] === icon) return true;
                    
                    // Vertical
                    if (r < GRID_SIZE - 2 && grid[r+1][c] === icon && grid[r+2][c] === icon) return true;
                }
            }
            return false;
        }
        
        // Render the grid
        function renderGrid() {
            const container = document.getElementById('crush-grid');
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
            
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'crush-tile';
                    tile.dataset.row = r;
                    tile.dataset.col = c;
                    tile.innerHTML = grid[r][c];
                    
                    // Drag events
                    tile.addEventListener('dragstart', (e) => {
                        if (isProcessing) return;
                        e.dataTransfer.setData('text/plain', `${r},${c}`);
                        selectedTile = {row: r, col: c};
                    });
                    
                    tile.addEventListener('dragover', (e) => e.preventDefault());
                    
                    tile.addEventListener('drop', (e) => {
                        e.preventDefault();
                        if (isProcessing) return;
                        
                        const [fromR, fromC] = e.dataTransfer.getData('text/plain').split(',').map(Number);
                        const toR = parseInt(tile.dataset.row);
                        const toC = parseInt(tile.dataset.col);
                        
                        if (Math.abs(fromR - toR) + Math.abs(fromC - toC) === 1) {
                            swapTiles(fromR, fromC, toR, toC);
                        }
                        selectedTile = null;
                    });
                    
                    // Click to select / swap
                    tile.addEventListener('click', () => {
                        if (isProcessing) return;
                        
                        if (!selectedTile) {
                            selectedTile = {row: r, col: c};
                            tile.style.boxShadow = '0 0 0 4px #dc2626';
                        } else {
                            const fromR = selectedTile.row;
                            const fromC = selectedTile.col;
                            
                            if (Math.abs(fromR - r) + Math.abs(fromC - c) === 1) {
                                swapTiles(fromR, fromC, r, c);
                            }
                            
                            // Reset selection
                            document.querySelectorAll('.crush-tile').forEach(t => t.style.boxShadow = '0 4px 6px -1px rgb(0 0 0 / 0.3)');
                            selectedTile = null;
                        }
                    });
                    
                    container.appendChild(tile);
                }
            }
        }
        
        function swapTiles(r1, c1, r2, c2) {
            if (isProcessing) return;
            
            // Swap in grid
            const temp = grid[r1][c1];
            grid[r1][c1] = grid[r2][c2];
            grid[r2][c2] = temp;
            
            renderGrid();
            
            // Check for matches
            setTimeout(() => {
                if (hasMatches()) {
                    movesLeft--;
                    document.getElementById('moves-left').textContent = movesLeft;
                    processMatches();
                } else {
                    // Swap back
                    const temp2 = grid[r1][c1];
                    grid[r1][c1] = grid[r2][c2];
                    grid[r2][c2] = temp2;
                    renderGrid();
                }
            }, 150);
        }
        
        function processMatches() {
            isProcessing = true;
            
            let matches = findAllMatches();
            if (matches.length === 0) {
                isProcessing = false;
                checkGameEnd();
                return;
            }
            
            // Calculate score
            let matchScore = 0;
            matches.forEach(match => {
                matchScore += match.length * 100;
            });
            
            // Combo multiplier
            const combo = Math.min(Math.floor(matches.length / 2) + 1, 5);
            matchScore *= combo;
            
            score += matchScore;
            document.getElementById('score').textContent = score.toLocaleString();
            
            // Show combo text
            if (combo > 1) {
                showComboText(combo);
            }
            
            // Remove matched tiles
            removeMatches(matches);
            
            setTimeout(() => {
                dropTiles();
                setTimeout(() => {
                    refillGrid();
                    setTimeout(() => {
                        isProcessing = false;
                        
                        // Check for more matches
                        if (hasMatches()) {
                            processMatches();
                        } else {
                            checkGameEnd();
                        }
                    }, 300);
                }, 400);
            }, 300);
        }
        
        function findAllMatches() {
            const matches = [];
            const visited = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(false));
            
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (visited[r][c]) continue;
                    
                    const icon = grid[r][c];
                    let match = [];
                    
                    // Horizontal
                    let horizontal = [];
                    for (let cc = c; cc < GRID_SIZE; cc++) {
                        if (grid[r][cc] === icon) {
                            horizontal.push({r, c: cc});
                        } else break;
                    }
                    
                    if (horizontal.length >= 3) {
                        horizontal.forEach(pos => visited[pos.r][pos.c] = true);
                        matches.push(horizontal);
                    }
                    
                    // Vertical
                    let vertical = [];
                    for (let rr = r; rr < GRID_SIZE; rr++) {
                        if (grid[rr][c] === icon) {
                            vertical.push({r: rr, c});
                        } else break;
                    }
                    
                    if (vertical.length >= 3) {
                        vertical.forEach(pos => visited[pos.r][pos.c] = true);
                        matches.push(vertical);
                    }
                }
            }
            
            return matches;
        }
        
        function removeMatches(matches) {
            const container = document.getElementById('crush-grid');
            
            matches.forEach(match => {
                match.forEach(pos => {
                    const tile = container.children[pos.r * GRID_SIZE + pos.c];
                    if (tile) {
                        tile.classList.add('matched');
                        setTimeout(() => {
                            if (tile.parentNode) tile.parentNode.removeChild(tile);
                        }, 300);
                    }
                    grid[pos.r][pos.c] = null;
                });
            });
        }
        
        function dropTiles() {
            for (let c = 0; c < GRID_SIZE; c++) {
                let writeRow = GRID_SIZE - 1;
                
                for (let r = GRID_SIZE - 1; r >= 0; r--) {
                    if (grid[r][c] !== null) {
                        grid[writeRow][c] = grid[r][c];
                        if (writeRow !== r) grid[r][c] = null;
                        writeRow--;
                    }
                }
                
                // Fill empty spaces with nulls at top
                while (writeRow >= 0) {
                    grid[writeRow][c] = null;
                    writeRow--;
                }
            }
            
            renderGrid();
        }
        
        function refillGrid() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] === null) {
                        grid[r][c] = ICONS[Math.floor(Math.random() * ICONS.length)];
                    }
                }
            }
            
            renderGrid();
            
            // Make sure no immediate matches after refill
            setTimeout(() => {
                if (hasMatches()) {
                    processMatches();
                }
            }, 100);
        }
        
        function showComboText(combo) {
            const container = document.getElementById('crush-grid');
            const text = document.createElement('div');
            text.className = 'combo-text text-4xl font-black';
            text.textContent = `${combo}x COMBO!`;
            text.style.left = '50%';
            text.style.top = '30%';
            text.style.transform = 'translate(-50%, -50%)';
            
            container.style.position = 'relative';
            container.appendChild(text);
            
            setTimeout(() => {
                if (text.parentNode) text.parentNode.removeChild(text);
            }, 800);
        }
        
        function checkGameEnd() {
            if (movesLeft <= 0) {
                endGame();
            }
        }
        
        function endGame() {
            isProcessing = true;
            
            let rewardCoins = 0;
            let rewardStars = 0;
            let rewardMedals = 0;
            let rewardFreedom = 0;
            let rewardShields = 0;
            
            if (score >= 25000) {
                rewardCoins = 6000;
                rewardStars = 3;
                rewardMedals = 1;
                rewardFreedom = 1;
                rewardShields = 1;
            } else if (score >= 12000) {
                rewardCoins = 2500;
                rewardStars = 2;
                rewardMedals = 1;
            } else if (score >= 5000) {
                rewardCoins = 800;
                rewardStars = 1;
            } else {
                rewardCoins = Math.floor(score / 10);
            }
            
            // Update game state
            gameState.heroCoins += rewardCoins;
            gameState.stars = (gameState.stars || 0) + rewardStars;
            gameState.medals = (gameState.medals || 0) + rewardMedals;
            gameState.freedom = (gameState.freedom || 0) + rewardFreedom;
            gameState.shields = (gameState.shields || 0) + rewardShields;
            
            // Update high score
            if (score > highScore) {
                highScore = score;
                document.getElementById('high-score').textContent = highScore.toLocaleString();
            }
            
            saveGameState();
            
            // Show results
            const resultHTML = `
                <div class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[100]">
                    <div class="bg-slate-900 rounded-3xl p-8 max-w-sm w-full mx-4 text-center border border-slate-700">
                        <div class="text-6xl mb-4">🦅</div>
                        <div class="text-3xl font-bold mb-2">MISSION COMPLETE</div>
                        <div class="text-xl text-yellow-400 mb-6">FINAL SCORE: ${score.toLocaleString()}</div>
                        
                        <div class="bg-slate-800 rounded-2xl p-4 mb-6 text-left">
                            <div class="flex justify-between py-1">
                                <span>Hero Coins</span>
                                <span class="font-bold text-yellow-400">+${rewardCoins}</span>
                            </div>
                            ${rewardStars > 0 ? `<div class="flex justify-between py-1"><span>Stars</span><span class="font-bold text-yellow-400">+${rewardStars} ⭐</span></div>` : ''}
                            ${rewardMedals > 0 ? `<div class="flex justify-between py-1"><span>Medals</span><span class="font-bold text-yellow-400">+${rewardMedals} 🎖️</span></div>` : ''}
                            ${rewardFreedom > 0 ? `<div class="flex justify-between py-1"><span>Freedom Spins</span><span class="font-bold text-emerald-400">+${rewardFreedom} 🌀</span></div>` : ''}
                        </div>
                        
                        <button onclick="location.reload()" 
                                class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-4 rounded-2xl text-lg mb-3">
                            PLAY AGAIN
                        </button>
                        
                        <button onclick="returnToBase()" 
                                class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-2xl text-sm">
                            RETURN TO BASE
                        </button>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', resultHTML);
        }
        
        function reshuffleBoard() {
            if (isProcessing) return;
            
            createGrid();
            renderGrid();
            
            // Deduct 1 move for reshuffle
            movesLeft = Math.max(1, movesLeft - 1);
            document.getElementById('moves-left').textContent = movesLeft;
        }
        
        function returnToBase() {
            // Save any remaining progress
            saveGameState();
            window.close();
        }
        
        // Initialize game
        function initGame() {
            initTailwind();
            loadGameState();
            
            createGrid();
            renderGrid();
            
            // Update moves display
            document.getElementById('moves-left').textContent = movesLeft;
            document.getElementById('score').textContent = '0';
            
            // Keyboard support
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    if (!isProcessing) {
                        reshuffleBoard();
                    }
                }
                
                if (e.key.toLowerCase() === 'r') {
                    if (!isProcessing) reshuffleBoard();
                }
            });
            
            // Auto-save every 10 seconds
            setInterval(saveGameState, 10000);
            
            // Welcome message
            setTimeout(() => {
                const welcome = document.createElement('div');
                welcome.className = 'fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-slate-800 text-xs px-4 py-2 rounded-full border border-slate-600';
                welcome.textContent = '🇺🇸 Drag tiles to match • Tap to swap • 30 moves to glory!';
                document.body.appendChild(welcome);
                
                setTimeout(() => {
                    if (welcome.parentNode) welcome.parentNode.removeChild(welcome);
                }, 2800);
            }, 800);
            
            console.log('%c[Hero Crush] Game initialized successfully', 'color:#22c55e');
        }
        
        // Start the game
        window.onload = initGame;
    </script>
</body>
</html>
