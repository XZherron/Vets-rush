<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EAGLE STRIKE 🦅 | VETS RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; background: linear-gradient(180deg, #0f172a 0%, #1e3a8a 100%); color: white; }
        .game-canvas { border: 4px solid #1e40af; border-radius: 16px; box-shadow: 0 0 30px rgba(59, 130, 246, 0.5); }
        .stat { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="bg-slate-950 text-white">
    <!-- Header -->
    <div class="bg-slate-900 border-b border-slate-700 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-orange-500 rounded-2xl flex items-center justify-center text-2xl">🦅</div>
            <div>
                <div class="font-bold text-2xl tracking-tighter text-orange-400">EAGLE STRIKE</div>
                <div class="text-[10px] text-slate-400 -mt-1">PROTECT THE SKIES • HOMES FOR VETS</div>
            </div>
        </div>
        <div class="flex items-center gap-x-2">
            <div class="bg-slate-800 px-3 py-1 rounded-2xl text-sm flex items-center gap-x-1">
                <span class="text-yellow-400">🪙</span>
                <span id="header-coins" class="font-mono font-bold">3,277,350</span>
            </div>
            <button onclick="exitToBase()" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-2xl text-sm flex items-center gap-x-1">
                <i class="fa-solid fa-home"></i>
                <span>BASE</span>
            </button>
        </div>
    </div>

    <!-- Game Container -->
    <div class="max-w-md mx-auto pt-4 px-4">
        <!-- Mission Info -->
        <div class="flex justify-between items-center mb-3 px-1">
            <div>
                <div class="text-sm text-orange-400">MISSION: SKY DEFENSE</div>
                <div class="text-xs text-slate-400">Shield: <span id="shield-count" class="font-bold text-emerald-400">3</span> • Score: <span id="score" class="font-mono font-bold">0</span></div>
            </div>
            <div class="text-right">
                <div class="text-[10px] text-slate-400">HIGH SCORE</div>
                <div id="high-score" class="font-mono text-lg font-bold text-amber-400">12,450</div>
            </div>
        </div>

        <!-- Game Canvas -->
        <canvas id="game-canvas" width="380" height="520" class="game-canvas mx-auto bg-[#0a1625]"></canvas>

        <!-- Controls -->
        <div class="mt-4 text-center">
            <div class="text-xs text-slate-400 mb-2">HOLD to CLIMB • RELEASE to DIVE</div>
            <div class="flex gap-2 justify-center">
                <button id="start-btn" onclick="startGame()" 
                        class="flex-1 max-w-[140px] bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-2xl text-lg flex items-center justify-center gap-x-2">
                    <i class="fa-solid fa-play"></i>
                    <span>TAKE OFF</span>
                </button>
                <button onclick="exitToBase()" 
                        class="flex-1 max-w-[140px] bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-2xl text-lg flex items-center justify-center gap-x-2">
                    <i class="fa-solid fa-sign-out-alt"></i>
                    <span>ABORT</span>
                </button>
            </div>
        </div>

        <!-- Rewards Preview -->
        <div class="mt-3 bg-slate-900 rounded-2xl p-3 text-xs border border-slate-700">
            <div class="flex justify-between text-slate-400">
                <div>Per 100m: <span class="text-emerald-400">+250 🪙</span></div>
                <div>Stars collected: <span class="text-yellow-400">+50 each</span></div>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div class="bg-slate-900 rounded-3xl p-6 max-w-[320px] w-full mx-4 border border-orange-500">
            <div class="text-center">
                <div class="text-6xl mb-2">🦅</div>
                <div class="text-2xl font-bold text-orange-400 mb-1">MISSION COMPLETE</div>
                <div class="text-sm text-slate-400 mb-4">You protected the skies, Patriot!</div>
                
                <div class="bg-slate-800 rounded-2xl p-4 mb-4">
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <div class="text-left">Distance</div>
                        <div class="text-right font-mono text-emerald-400" id="final-distance">0m</div>
                        <div class="text-left">Stars Collected</div>
                        <div class="text-right font-mono text-yellow-400" id="final-stars">0</div>
                        <div class="text-left font-bold">TOTAL REWARD</div>
                        <div class="text-right font-mono text-xl font-bold text-yellow-400" id="final-reward">0 🪙</div>
                    </div>
                </div>

                <button onclick="restartMission()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-2xl mb-2 flex items-center justify-center gap-x-2">
                    <i class="fa-solid fa-redo"></i>
                    <span>FLY AGAIN</span>
                </button>
                <button onclick="exitToBase()" 
                        class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-2xl flex items-center justify-center gap-x-2">
                    <i class="fa-solid fa-home"></i>
                    <span>RETURN TO BASE</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== SHARED STATE (localStorage sync) ====================
        let gameState = {
            heroCoins: 3277350,
            stars: 0,
            torpedoes: 0,
            freedom: 3,
            valor: 0,
            flags: 0,
            helmets: 0,
            medals: 0,
            homes: 12,
            beds: 0
        };

        function loadGameState() {
            const saved = localStorage.getItem('vetsRushGameState');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    gameState = { ...gameState, ...parsed };
                } catch (e) {}
            }
            updateHeader();
        }

        function saveGameState() {
            localStorage.setItem('vetsRushGameState', JSON.stringify(gameState));
        }

        function updateHeader() {
            const coinsEl = document.getElementById('header-coins');
            if (coinsEl) coinsEl.innerText = gameState.heroCoins.toLocaleString();
        }

        // ==================== GAME VARIABLES ====================
        let canvas, ctx;
        let eagle = { x: 100, y: 260, vy: 0, size: 32 };
        let obstacles = [];
        let collectibles = [];
        let particles = [];
        let score = 0;
        let distance = 0;
        let shields = 3;
        let gameRunning = false;
        let frame = 0;
        let lastTime = 0;
        let highScore = 12450;
        let isClimbing = false;

        const GRAVITY = 0.35;
        const CLIMB_FORCE = -0.85;
        const MAX_SPEED = 8;

        function initCanvas() {
            canvas = document.getElementById('game-canvas');
            ctx = canvas.getContext('2d', { alpha: true });
            
            // Load high score
            const savedHigh = localStorage.getItem('eagleStrikeHighScore');
            if (savedHigh) highScore = parseInt(savedHigh);
            document.getElementById('high-score').innerText = highScore.toLocaleString();

            // Touch / Mouse controls
            canvas.addEventListener('mousedown', () => { isClimbing = true; });
            canvas.addEventListener('mouseup', () => { isClimbing = false; });
            canvas.addEventListener('mouseleave', () => { isClimbing = false; });
            
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isClimbing = true; });
            canvas.addEventListener('touchend', (e) => { e.preventDefault(); isClimbing = false; });

            // Keyboard support
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    isClimbing = true;
                }
            });
            document.addEventListener('keyup', (e) => {
                if (e.key === ' ' || e.key === 'Spacebar') {
                    isClimbing = false;
                }
            });

            // Click anywhere on canvas to start if not running
            canvas.addEventListener('click', () => {
                if (!gameRunning) startGame();
            });
        }

        function resetGame() {
            eagle = { x: 90, y: 260, vy: 0, size: 32 };
            obstacles = [];
            collectibles = [];
            particles = [];
            score = 0;
            distance = 0;
            shields = 3;
            frame = 0;
            isClimbing = false;
            gameRunning = false;

            document.getElementById('score').innerText = '0';
            document.getElementById('shield-count').innerText = '3';
            document.getElementById('game-over-modal').classList.add('hidden');
        }

        function startGame() {
            if (gameRunning) return;
            
            resetGame();
            gameRunning = true;
            document.getElementById('start-btn').innerHTML = `<i class="fa-solid fa-pause"></i> <span>IN FLIGHT</span>`;
            document.getElementById('start-btn').disabled = true;

            // Spawn initial obstacles & collectibles
            for (let i = 0; i < 3; i++) {
                spawnObstacle();
            }
            for (let i = 0; i < 2; i++) {
                spawnCollectible();
            }

            requestAnimationFrame(gameLoop);
        }

        function spawnObstacle() {
            const types = ['drone', 'cloud', 'lightning'];
            const type = types[Math.floor(Math.random() * types.length)];
            obstacles.push({
                x: canvas.width + 40,
                y: 60 + Math.random() * (canvas.height - 140),
                width: type === 'cloud' ? 70 : 42,
                height: type === 'cloud' ? 45 : 32,
                type: type,
                speed: 2.2 + Math.random() * 1.8,
                passed: false
            });
        }

        function spawnCollectible() {
            const types = ['star', 'flag', 'coin'];
            const type = types[Math.floor(Math.random() * types.length)];
            collectibles.push({
                x: canvas.width + 30,
                y: 80 + Math.random() * (canvas.height - 160),
                type: type,
                size: 18,
                speed: 2.5,
                value: type === 'star' ? 50 : type === 'flag' ? 30 : 20
            });
        }

        function createExplosion(x, y, color = '#f59e0b') {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 18 + Math.random() * 12,
                    color: color,
                    size: 3 + Math.random() * 3
                });
            }
        }

        function gameLoop(timestamp = 0) {
            if (!gameRunning) return;

            ctx.fillStyle = '#0a1625';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Scrolling sky background (simple gradient + stars)
            ctx.fillStyle = '#1e3a8a';
            ctx.fillRect(0, 0, canvas.width, canvas.height * 0.6);
            
            // Distant clouds
            ctx.fillStyle = 'rgba(148, 163, 184, 0.15)';
            for (let i = 0; i < 5; i++) {
                const cx = ((frame * 0.3 + i * 120) % (canvas.width + 200)) - 100;
                ctx.beginPath();
                ctx.ellipse(cx, 90 + i * 18, 55, 22, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // Eagle physics
            if (isClimbing) {
                eagle.vy += CLIMB_FORCE;
            } else {
                eagle.vy += GRAVITY;
            }
            eagle.vy = Math.max(Math.min(eagle.vy, MAX_SPEED), -MAX_SPEED);
            eagle.y += eagle.vy;

            // Clamp eagle position
            if (eagle.y < 30) { eagle.y = 30; eagle.vy = 0; }
            if (eagle.y > canvas.height - 45) { eagle.y = canvas.height - 45; eagle.vy = 0; }

            // Draw Eagle (simple but nice jet/eagle)
            ctx.save();
            ctx.translate(eagle.x, eagle.y);
            
            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.ellipse(4, 8, 18, 7, 0, 0, Math.PI * 2);
            ctx.fill();

            // Body
            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            ctx.ellipse(0, 0, 22, 11, 0, 0, Math.PI * 2);
            ctx.fill();

            // Wing
            ctx.fillStyle = '#d97706';
            ctx.beginPath();
            ctx.moveTo(-8, 0);
            ctx.quadraticCurveTo(-22, -18, -6, -6);
            ctx.fill();

            // Head
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath();
            ctx.arc(16, -2, 8, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#dc2626';
            ctx.beginPath();
            ctx.moveTo(22, -2);
            ctx.lineTo(30, 0);
            ctx.lineTo(22, 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = '#111827';
            ctx.beginPath();
            ctx.arc(18, -3, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Update & draw obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= obs.speed;

                // Draw obstacle
                if (obs.type === 'drone') {
                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.fillStyle = '#b91c1c';
                    ctx.fillRect(obs.x + 8, obs.y + 8, obs.width - 16, obs.height - 16);
                    // Propellers
                    ctx.strokeStyle = '#64748b';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(obs.x - 4, obs.y + 6);
                    ctx.lineTo(obs.x + obs.width + 4, obs.y + 6);
                    ctx.stroke();
                } else if (obs.type === 'cloud') {
                    ctx.fillStyle = '#475569';
                    ctx.beginPath();
                    ctx.ellipse(obs.x + 20, obs.y + 18, 32, 18, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(obs.x + 45, obs.y + 12, 26, 15, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else if (obs.type === 'lightning') {
                    ctx.fillStyle = '#eab308';
                    ctx.fillRect(obs.x + 12, obs.y, 8, obs.height);
                    ctx.fillStyle = '#f59e0b';
                    ctx.fillRect(obs.x + 8, obs.y + 12, 16, 6);
                }

                // Collision
                if (checkCollision(eagle, obs)) {
                    createExplosion(eagle.x + 10, eagle.y, '#ef4444');
                    shields--;
                    document.getElementById('shield-count').innerText = shields;
                    obstacles.splice(i, 1);
                    spawnObstacle();

                    if (shields <= 0) {
                        endGame();
                        return;
                    }
                }

                // Score for passing
                if (!obs.passed && obs.x + obs.width < eagle.x) {
                    obs.passed = true;
                    score += 10;
                    distance += 25;
                    document.getElementById('score').innerText = score;
                }

                // Remove off-screen
                if (obs.x < -80) obstacles.splice(i, 1);
            }

            // Spawn new obstacles
            if (frame % 38 === 0 && Math.random() > 0.3) spawnObstacle();

            // Update & draw collectibles
            for (let i = collectibles.length - 1; i >= 0; i--) {
                const col = collectibles[i];
                col.x -= col.speed;

                // Draw
                ctx.font = 'bold 20px Inter';
                ctx.textAlign = 'center';
                if (col.type === 'star') {
                    ctx.fillText('⭐', col.x, col.y + 6);
                } else if (col.type === 'flag') {
                    ctx.fillText('🇺🇸', col.x, col.y + 6);
                } else {
                    ctx.fillText('🪙', col.x, col.y + 6);
                }

                // Collect
                const dx = eagle.x - col.x;
                const dy = eagle.y - col.y;
                if (Math.sqrt(dx*dx + dy*dy) < 28) {
                    score += col.value;
                    if (col.type === 'star') gameState.stars += 1;
                    if (col.type === 'flag') gameState.flags += 1;
                    if (col.type === 'coin') gameState.heroCoins += 25;

                    createExplosion(col.x, col.y, '#fbbf24');
                    collectibles.splice(i, 1);
                    document.getElementById('score').innerText = score;
                    updateHeader();
                }

                if (col.x < -30) collectibles.splice(i, 1);
            }

            if (frame % 52 === 0) spawnCollectible();

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vy += 0.08;
                ctx.globalAlpha = p.life / 25;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1;

            // Distance counter (visual)
            distance += 0.8;
            if (Math.floor(distance) % 40 === 0 && frame % 4 === 0) {
                score += 1;
                document.getElementById('score').innerText = score;
            }

            // Update UI
            if (frame % 8 === 0) {
                document.getElementById('score').innerText = score;
            }

            frame++;
            requestAnimationFrame(gameLoop);
        }

        function checkCollision(e, o) {
            return !(e.x + e.size < o.x || 
                     e.x > o.x + o.width || 
                     e.y + e.size < o.y || 
                     e.y > o.y + o.height);
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('start-btn').innerHTML = `<i class="fa-solid fa-play"></i> <span>TAKE OFF</span>`;
            document.getElementById('start-btn').disabled = false;

            // Calculate rewards
            const rewardCoins = Math.floor(distance * 2.5) + (score * 8);
            const bonusStars = Math.floor(score / 40);
            const bonusFlags = Math.floor(distance / 180);

            gameState.heroCoins += rewardCoins;
            gameState.stars += bonusStars;
            gameState.flags += bonusFlags;

            // Update high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('eagleStrikeHighScore', highScore);
                document.getElementById('high-score').innerText = highScore.toLocaleString();
            }

            saveGameState();
            updateHeader();

            // Show modal
            document.getElementById('final-distance').innerText = Math.floor(distance) + 'm';
            document.getElementById('final-stars').innerText = bonusStars;
            document.getElementById('final-reward').innerText = rewardCoins.toLocaleString() + ' 🪙';
            document.getElementById('game-over-modal').classList.remove('hidden');

            // Confetti
            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    createExplosion(Math.random() * canvas.width, 60 + Math.random() * 80, 
                                   ['#fbbf24', '#22c55e', '#3b82f6'][Math.floor(Math.random()*3)]);
                }, i * 8);
            }
        }

        function restartMission() {
            document.getElementById('game-over-modal').classList.add('hidden');
            startGame();
        }

        function exitToBase() {
            if (gameRunning) {
                // Save partial progress
                const partialReward = Math.floor(distance * 1.2);
                gameState.heroCoins += partialReward;
                saveGameState();
            }
            // Return to main app
            if (window.opener) {
                window.opener.focus();
            }
            window.close();
        }

        // Keyboard hint
        function showKeyboardHint() {
            setTimeout(() => {
                const hint = document.createElement('div');
                hint.className = 'fixed bottom-4 left-1/2 -translate-x-1/2 text-[10px] text-slate-400 bg-slate-900 px-3 py-1 rounded-full';
                hint.innerText = 'Press SPACE to climb';
                document.body.appendChild(hint);
                setTimeout(() => hint.remove(), 2200);
            }, 1800);
        }

        // Boot
        function bootEagleStrike() {
            loadGameState();
            initCanvas();
            resetGame();
            showKeyboardHint();

            // Auto-start hint
            setTimeout(() => {
                if (!gameRunning) {
                    const btn = document.getElementById('start-btn');
                    btn.classList.add('animate-pulse');
                    setTimeout(() => btn.classList.remove('animate-pulse'), 1600);
                }
            }, 900);

            // Easter egg: click header to add test coins
            document.querySelector('header, .bg-slate-900').addEventListener('click', (e) => {
                if (e.detail === 3) { // triple click
                    gameState.heroCoins += 5000;
                    saveGameState();
                    updateHeader();
                }
            });
        }

        window.onload = bootEagleStrike;
    </script>
</body>
</html>
