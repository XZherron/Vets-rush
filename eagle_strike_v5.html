<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EAGLE STRIKE 🦅 | VETS RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; background: #0f172a; color: white; }
        .game-canvas { border: 4px solid #f59e0b; border-radius: 16px; box-shadow: 0 0 30px #f59e0b40; }
    </style>
</head>
<body class="bg-slate-950 text-white">
    <div class="bg-slate-900 border-b border-slate-700 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-orange-500 rounded-2xl flex items-center justify-center text-2xl">🦅</div>
            <div>
                <div class="font-bold text-2xl text-orange-400">EAGLE STRIKE</div>
                <div class="text-xs text-slate-400">SLOWER MODE • TAP &amp; HOLD TO CLIMB</div>
            </div>
        </div>
        <div class="flex items-center gap-x-2">
            <div class="bg-slate-800 px-3 py-1 rounded-2xl text-sm flex items-center gap-x-1">
                <span>🪙</span>
                <span id="coins" class="font-mono font-bold">3,277,350</span>
            </div>
            <button onclick="exitToBase()" class="bg-slate-700 px-3 py-1.5 rounded-2xl text-sm">BASE</button>
        </div>
    </div>

    <div class="max-w-[380px] mx-auto pt-6 px-4">
        <div class="flex justify-between text-sm mb-2 px-1">
            <div>Shield: <span id="shields" class="font-bold text-emerald-400">3</span></div>
            <div>Score: <span id="score" class="font-mono font-bold">0</span></div>
        </div>

        <canvas id="canvas" width="380" height="520" class="game-canvas mx-auto bg-[#0a1625]"></canvas>

        <div class="text-center mt-4">
            <div class="text-orange-400 font-medium">TAP &amp; HOLD ANYWHERE TO CLIMB • RELEASE TO DIVE</div>
            <div class="text-xs text-slate-400 mt-1">SLOWER MODE • Starting Shield + Countdown</div>
        </div>

        <div class="flex gap-3 mt-5">
            <button id="start" onclick="start()" class="flex-1 bg-orange-500 hover:bg-orange-600 py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-x-2">
                <i class="fa-solid fa-play"></i> <span>START MISSION</span>
            </button>
            <button onclick="exitToBase()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-x-2">
                <i class="fa-solid fa-home"></i> <span>ABORT</span>
            </button>
        </div>
    </div>

    <div id="over" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-slate-900 rounded-3xl p-6 w-full max-w-[300px] mx-4 text-center border border-orange-500">
            <div class="text-6xl mb-2">🦅</div>
            <div class="text-2xl font-bold text-orange-400 mb-4">MISSION COMPLETE</div>
            
            <div class="bg-slate-800 rounded-2xl p-4 mb-4 text-sm text-left">
                <div class="flex justify-between"><span>Distance</span><span id="fd" class="font-mono">0m</span></div>
                <div class="flex justify-between"><span>Stars</span><span id="fs" class="font-mono">0</span></div>
                <div class="flex justify-between font-bold mt-1"><span>TOTAL</span><span id="fr" class="font-mono text-yellow-400">0 🪙</span></div>
            </div>
            
            <button onclick="restart()" class="w-full bg-emerald-600 py-3 rounded-2xl font-bold mb-2">FLY AGAIN</button>
            <button onclick="exitToBase()" class="w-full bg-slate-700 py-3 rounded-2xl font-bold">RETURN TO BASE</button>
        </div>
    </div>

    <script>
        let gameState = { heroCoins: 3277350, stars: 0, flags: 0 };
        
        function load() {
            const s = localStorage.getItem('vetsRushGameState');
            if (s) gameState = {...gameState, ...JSON.parse(s)};
            document.getElementById('coins').innerText = gameState.heroCoins.toLocaleString();
        }
        function save() { localStorage.setItem('vetsRushGameState', JSON.stringify(gameState)); }

        let c, ctx, eagle, obs = [], st = [], parts = [];
        let score = 0, dist = 0, shields = 3, run = false, climb = false, fr = 0;

        function init() {
            c = document.getElementById('canvas');
            ctx = c.getContext('2d');
            load();

            const set = (v) => { if (run) climb = v; };
            
            c.addEventListener('mousedown', () => set(true));
            window.addEventListener('mouseup', () => set(false));
            c.addEventListener('touchstart', e => { e.preventDefault(); set(true); }, {passive:false});
            window.addEventListener('touchend', e => { e.preventDefault(); set(false); }, {passive:false});
            
            c.addEventListener('click', () => {
                if (!run) start();
                else climb = true;
            });

            reset();
        }

        function reset() {
            eagle = {x: 75, y: 260, vy: 0};
            obs = [];
            st = [];
            parts = [];
            score = 0;
            dist = 0;
            shields = 3;
            climb = false;
            run = false;
            fr = 0;
            
            document.getElementById('score').innerText = '0';
            document.getElementById('shields').innerText = '3';
            document.getElementById('over').classList.add('hidden');
            document.getElementById('start').innerHTML = `<i class="fa-solid fa-play"></i> <span>START MISSION</span>`;
            document.getElementById('start').disabled = false;
        }

        function start() {
            if (run) return;
            reset();
            run = true;
            document.getElementById('start').innerHTML = `<i class="fa-solid fa-plane"></i> <span>IN FLIGHT</span>`;
            document.getElementById('start').disabled = true;

            // Countdown
            let n = 3;
            const el = document.createElement('div');
            el.style.cssText = 'position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:80px;font-weight:900;color:#f59e0b;';
            el.innerText = n;
            c.parentElement.appendChild(el);
            
            const iv = setInterval(() => {
                n--;
                if (n > 0) el.innerText = n;
                else {
                    clearInterval(iv);
                    el.remove();
                    requestAnimationFrame(loop);
                }
            }, 650);
        }

        function loop() {
            if (!run) return;

            ctx.fillStyle = '#0a1625';
            ctx.fillRect(0, 0, 380, 520);
            ctx.fillStyle = '#1e3a8a';
            ctx.fillRect(0, 0, 380, 260);

            // Eagle (slower mode)
            if (climb) eagle.vy -= 0.9;
            else eagle.vy += 0.45;
            eagle.vy = Math.max(Math.min(eagle.vy, 6.5), -6.5);
            eagle.y += eagle.vy;

            if (eagle.y < 22) { eagle.y = 22; eagle.vy = 0; }
            if (eagle.y > 498) { eagle.y = 498; eagle.vy = 0; }

            // Draw Eagle
            ctx.save();
            ctx.translate(eagle.x, eagle.y);
            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            ctx.ellipse(0, 0, 17, 8, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath();
            ctx.arc(13, -1, 5.5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#dc2626';
            ctx.beginPath();
            ctx.moveTo(17, -1);
            ctx.lineTo(23, 1);
            ctx.lineTo(17, 2);
            ctx.fill();
            ctx.fillStyle = '#111827';
            ctx.beginPath();
            ctx.arc(15, -2, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();

            // Obstacles
            for (let i = obs.length-1; i>=0; i--) {
                const o = obs[i];
                o.x -= 2.6;
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(o.x, o.y, 36, 26);

                if (eagle.x + 15 > o.x && eagle.x < o.x + 36 && eagle.y + 7 > o.y && eagle.y < o.y + 26) {
                    shields--;
                    document.getElementById('shields').innerText = shields;
                    createPart(eagle.x, eagle.y, '#ef4444');
                    obs.splice(i, 1);
                    if (shields <= 0) return end();
                }
                if (o.x < -50) obs.splice(i, 1);
            }
            if (fr % 26 === 0) obs.push({x: 410, y: 70 + Math.random()*370});

            // Stars
            for (let i = st.length-1; i>=0; i--) {
                const s = st[i];
                s.x -= 3.1;
                ctx.font = '20px Inter';
                ctx.fillText('⭐', s.x, s.y);

                if (Math.hypot(eagle.x - s.x, eagle.y - s.y) < 22) {
                    score += 35;
                    gameState.stars += 1;
                    createPart(s.x, s.y, '#fbbf24');
                    st.splice(i, 1);
                    document.getElementById('score').innerText = score;
                    save();
                }
                if (s.x < -30) st.splice(i, 1);
            }
            if (fr % 38 === 0) st.push({x: 410, y: 90 + Math.random()*340});

            // Particles
            for (let i = parts.length-1; i>=0; i--) {
                const p = parts[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                ctx.globalAlpha = p.life/15;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 2.5, 2.5);
                if (p.life <= 0) parts.splice(i, 1);
            }
            ctx.globalAlpha = 1;

            dist += 1.05;
            score = Math.floor(dist / 3.2);
            document.getElementById('score').innerText = score;

            fr++;
            requestAnimationFrame(loop);
        }

        function createPart(x, y, color) {
            for (let i=0; i<9; i++) {
                parts.push({x, y, vx:(Math.random()-0.5)*4.5, vy:(Math.random()-0.5)*4.5, life:14, color});
            }
        }

        function end() {
            run = false;
            const rew = Math.floor(dist * 2.7) + (score * 5);
            gameState.heroCoins += rew;
            gameState.stars += Math.floor(score / 32);
            save();
            document.getElementById('coins').innerText = gameState.heroCoins.toLocaleString();

            document.getElementById('fd').innerText = Math.floor(dist) + 'm';
            document.getElementById('fs').innerText = Math.floor(score / 32);
            document.getElementById('fr').innerText = rew + ' 🪙';
            document.getElementById('over').classList.remove('hidden');

            document.getElementById('start').innerHTML = `<i class="fa-solid fa-play"></i> <span>START MISSION</span>`;
            document.getElementById('start').disabled = false;
        }

        function restart() {
            document.getElementById('over').classList.add('hidden');
            start();
        }

        function exitToBase() {
            if (run) {
                gameState.heroCoins += Math.floor(dist * 1.4);
                save();
            }
            if (window.opener) window.opener.focus();
            window.close();
        }

        window.onload = init;
    </script>
</body>
</html>
