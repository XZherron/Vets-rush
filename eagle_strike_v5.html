<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EAGLE STRIKE 🦅 | VETS RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; background: #0f172a; color: white; }
        .game-canvas { border: 4px solid #f59e0b; border-radius: 16px; box-shadow: 0 0 30px #f59e0b40; }
    </style>
</head>
<body class="bg-slate-950 text-white">
    <div class="bg-slate-900 border-b border-slate-700 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-x-3">
            <div class="w-10 h-10 bg-orange-500 rounded-2xl flex items-center justify-center text-2xl">🦅</div>
            <div>
                <div class="font-bold text-2xl text-orange-400">EAGLE STRIKE</div>
                <div class="text-xs text-slate-400">SLOWER MODE • TAP & HOLD TO CLIMB</div>
            </div>
        </div>
        <div class="flex items-center gap-x-2">
            <div class="bg-slate-800 px-3 py-1 rounded-2xl text-sm flex items-center gap-x-1">
                <i class="fa-solid fa-coins text-yellow-400"></i>
                <span id="coins" class="font-mono font-bold">0</span>
            </div>
            <button onclick="exitToBase()" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-2xl text-sm flex items-center gap-x-1">
                <i class="fa-solid fa-home"></i> <span>BASE</span>
            </button>
        </div>
    </div>

    <div class="max-w-[380px] mx-auto pt-6 px-4">
        <div class="flex justify-between text-sm mb-2 px-1">
            <div>Shield: <span id="shields" class="font-bold text-emerald-400">3</span> 
                <span class="text-xs text-emerald-400">(<span id="shield-hits">3</span> hits)</span>
            </div>
            <div>Score: <span id="score" class="font-mono font-bold">0</span></div>
        </div>
        <div class="text-xs text-emerald-400 mb-1 px-1">Shield Time: <span id="shield-time">30</span>s</div>

        <canvas id="canvas" width="380" height="520" class="game-canvas mx-auto bg-[#0a1625]"></canvas>

        <div class="text-center mt-4">
            <div class="text-orange-400 font-medium">TAP & HOLD ANYWHERE TO CLIMB • RELEASE TO DIVE</div>
            <div class="text-xs text-slate-400 mt-1">SLOWER MODE • Shield breaks after time OR hits taken</div>
        </div>

        <div class="flex gap-3 mt-5">
            <button id="startBtn" onclick="start()" class="flex-1 bg-orange-500 hover:bg-orange-600 py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-x-2">
                <i class="fa-solid fa-play"></i> <span>START MISSION</span>
            </button>
            <button onclick="exitToBase()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-x-2">
                <i class="fa-solid fa-home"></i> <span>ABORT</span>
            </button>
        </div>
    </div>

    <div id="over" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8 max-w-[320px] text-center">
            <div class="text-6xl mb-3">🦅</div>
            <div class="text-2xl font-bold mb-2">MISSION COMPLETE</div>
            <div class="text-4xl font-mono font-bold text-orange-400 mb-4" id="final-score">0</div>
            <div class="text-sm text-slate-400 mb-4">Distance: <span id="final-dist">0</span>m</div>
            <div class="flex gap-3">
                <button onclick="restart()" class="flex-1 bg-orange-500 hover:bg-orange-600 py-3 rounded-2xl font-bold">FLY AGAIN</button>
                <button onclick="exitToBase()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-2xl font-bold">RETURN TO BASE</button>
            </div>
        </div>
    </div>

    <script>
        let gameState = JSON.parse(localStorage.getItem('vetsRushGameState')) || {
            heroCoins: 3277350, stars: 0, flags: 0, homes: 12, medals: 0,
            torpedoes: 0, freedom: 0, valor: 0, shields: 0,
            extraLives: 0, shieldDuration: 0, reinforcedShield: 0
        };

        function saveGameState() {
            localStorage.setItem('vetsRushGameState', JSON.stringify(gameState));
        }

        let extraLives = gameState.extraLives || 0;
        let shieldDurationBonus = gameState.shieldDuration || 0;
        let reinforcedBonus = gameState.reinforcedShield || 0;

        let c = document.getElementById('canvas');
        let ctx = c.getContext('2d');
        let eagle = {x: 75, y: 260, vy: 0, size: 28};
        let obstacles = [], stars = [], particles = [];
        let score = 0, distance = 0, shields = 3, shieldHits = 3, shieldTimeLeft = 30, isClimbing = false, isRunning = false, frame = 0;
        let shieldTimer = null, lastTime = Date.now();

        function updateUI() {
            document.getElementById('coins').innerText = gameState.heroCoins.toLocaleString();
            document.getElementById('shields').innerText = shields;
            document.getElementById('shield-hits').innerText = shieldHits;
            document.getElementById('shield-time').innerText = Math.max(0, Math.floor(shieldTimeLeft));
        }

        function createParticle(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({x, y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 22, color: color || '#fbbf24'});
            }
        }

        function resetGame() {
            eagle = {x: 75, y: 260, vy: 0, size: 28};
            obstacles = []; stars = []; particles = [];
            score = 0; distance = 0;
            shields = 1 + (extraLives || 0);
            shieldHits = 3 + (reinforcedBonus || 0);
            shieldTimeLeft = 30 + (shieldDurationBonus || 0);
            isClimbing = false; isRunning = false; frame = 0;
            if (shieldTimer) { clearInterval(shieldTimer); shieldTimer = null; }
            document.getElementById('score').innerText = '0';
            updateUI();
        }

        function start() {
            if (isRunning) return;
            resetGame();
            isRunning = true;
            document.getElementById('startBtn').innerHTML = '<i class="fa-solid fa-pause"></i> <span>PAUSE</span>';
            
            if (shieldTimer) clearInterval(shieldTimer);
            shieldTimer = setInterval(() => {
                if (isRunning && shieldTimeLeft > 0) {
                    shieldTimeLeft -= 0.1;
                    if (shieldTimeLeft <= 0) { shields = 0; updateUI(); }
                }
            }, 100);

            for (let i = 0; i < 4; i++) {
                obstacles.push({x: 400 + i*120, y: Math.random()*380+60, size: 22, type: Math.random()>0.6 ? 'drone' : 'cloud'});
            }
            for (let i = 0; i < 3; i++) {
                stars.push({x: 450 + i*90, y: Math.random()*400+50, size: 16});
            }
            lastTime = Date.now();
            requestAnimationFrame(gameLoop);
        }

        function restart() {
            document.getElementById('over').classList.add('hidden');
            start();
        }

        function gameLoop() {
            if (!isRunning) return;
            const now = Date.now();
            const delta = Math.min((now - lastTime) / 16, 2);
            lastTime = now;

            ctx.fillStyle = '#0a1625';
            ctx.fillRect(0, 0, c.width, c.height);

            ctx.strokeStyle = '#1e2937';
            ctx.lineWidth = 1;
            for (let i = 0; i < 8; i++) {
                const y = (frame * 1.5 + i * 70) % 520;
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(380, y); ctx.stroke();
            }

            if (isClimbing) {
                eagle.vy = Math.max(eagle.vy - 0.45 * delta, -4.5);
            } else {
                eagle.vy = Math.min(eagle.vy + 0.28 * delta, 5.5);
            }
            eagle.y += eagle.vy * delta;
            eagle.y = Math.max(30, Math.min(480, eagle.y));

            // Draw eagle
            ctx.save();
            ctx.translate(eagle.x, eagle.y);
            ctx.fillStyle = '#f59e0b';
            ctx.beginPath(); ctx.ellipse(0, 0, 18, 11, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath(); ctx.arc(14, -2, 7, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#ef4444';
            ctx.beginPath(); ctx.moveTo(19, -2); ctx.lineTo(26, -1); ctx.lineTo(19, 1); ctx.fill();
            ctx.fillStyle = '#d97706';
            ctx.beginPath(); ctx.ellipse(-4, -8, 14, 6, -0.6, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(-4, 8, 14, 6, 0.6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#111827';
            ctx.beginPath(); ctx.arc(16, -3, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

            // Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                o.x -= 2.8 * delta;
                if (o.x < -40) { obstacles.splice(i, 1); continue; }

                if (o.type === 'drone') {
                    ctx.fillStyle = '#ef4444';
                    ctx.beginPath(); ctx.rect(o.x - 12, o.y - 8, 24, 16); ctx.fill();
                    ctx.fillStyle = '#b91c1c';
                    ctx.fillRect(o.x - 6, o.y - 4, 12, 8);
                } else {
                    ctx.fillStyle = '#64748b';
                    ctx.beginPath(); ctx.ellipse(o.x, o.y, 18, 10, 0, 0, Math.PI * 2); ctx.fill();
                }

                const distX = Math.abs(eagle.x - o.x);
                const distY = Math.abs(eagle.y - o.y);
                if (distX < 26 && distY < 20) {
                    if (shields > 0 && shieldHits > 0) {
                        shieldHits--;
                        createParticle(o.x, o.y, '#22c55e');
                        obstacles.splice(i, 1);
                        updateUI();
                        if (shieldHits <= 0) { shields = 0; updateUI(); }
                    } else {
                        endGame();
                        return;
                    }
                }
            }

            // Stars
            for (let i = stars.length - 1; i >= 0; i--) {
                const s = stars[i];
                s.x -= 2.8 * delta;
                if (s.x < -20) { stars.splice(i, 1); continue; }

                ctx.fillStyle = '#fbbf24';
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size / 2, 0, Math.PI * 2); ctx.fill();

                const distX = Math.abs(eagle.x - s.x);
                const distY = Math.abs(eagle.y - s.y);
                if (distX < 22 && distY < 18) {
                    score += 150;
                    gameState.heroCoins += 120;
                    createParticle(s.x, s.y, '#fbbf24');
                    stars.splice(i, 1);
                    document.getElementById('score').innerText = score;
                    updateUI();
                }
            }

            if (Math.random() < 0.035) {
                obstacles.push({x: 420, y: Math.random()*380+60, size: 22, type: Math.random()>0.55 ? 'drone' : 'cloud'});
            }
            if (Math.random() < 0.028) {
                stars.push({x: 420, y: Math.random()*400+50, size: 16});
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life--;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life / 22;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
            }
            ctx.globalAlpha = 1;

            distance += 0.8 * delta;
            score = Math.floor(distance * 1.2);
            document.getElementById('score').innerText = score;

            if (frame % 8 === 0) updateUI();
            frame++;

            if (isRunning) requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isRunning = false;
            if (shieldTimer) { clearInterval(shieldTimer); shieldTimer = null; }

            gameState.heroCoins += Math.floor(score * 0.8);
            gameState.stars += Math.floor(score / 450);
            gameState.medals += Math.floor(score / 1200);
            saveGameState();

            document.getElementById('final-score').innerText = score;
            document.getElementById('final-dist').innerText = Math.floor(distance);
            document.getElementById('over').classList.remove('hidden');
            document.getElementById('startBtn').innerHTML = '<i class="fa-solid fa-play"></i> <span>START MISSION</span>';
        }

        function setupControls() {
            const canvas = document.getElementById('canvas');
            canvas.addEventListener('mousedown', () => { isClimbing = true; });
            canvas.addEventListener('mouseup', () => { isClimbing = false; });
            canvas.addEventListener('mouseleave', () => { isClimbing = false; });

            canvas.addEventListener('touchstart', e => { e.preventDefault(); isClimbing = true; });
            canvas.addEventListener('touchend', e => { e.preventDefault(); isClimbing = false; });

            document.addEventListener('keydown', e => {
                if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); isClimbing = true; }
                if (e.key.toLowerCase() === 'r' && !isRunning) start();
            });
            document.addEventListener('keyup', e => {
                if (e.key === ' ' || e.key === 'Spacebar') isClimbing = false;
            });
        }

        function exitToBase() {
            if (isRunning) endGame();
            saveGameState();
            if (window.opener) window.close();
            else window.location.href = 'index.html';
        }

        function init() {
            updateUI();
            setupControls();
            document.getElementById('shields').innerText = shields;
            document.getElementById('shield-hits').innerText = shieldHits;
            document.getElementById('shield-time').innerText = Math.floor(shieldTimeLeft);

            setTimeout(() => {
                if (!isRunning) {
                    const hint = document.createElement('div');
                    hint.className = 'text-center text-xs text-emerald-400 mt-2';
                    hint.innerHTML = 'Tap START MISSION to begin!';
                    document.querySelector('.max-w-\\[380px\\]').appendChild(hint);
                    setTimeout(() => hint.remove(), 2800);
                }
            }, 1200);
        }

        window.onload = init;
    </script>
</body>
</html>
