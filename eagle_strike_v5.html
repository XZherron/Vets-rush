<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EAGLE STRIKE 🦅 | VETS RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #1e2937 100%);
            color: white;
        }
        
        .game-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            background: #0f172a;
            box-shadow: 0 0 0 12px #1e2937;
            border-radius: 24px;
            overflow: hidden;
        }
        
        #gameCanvas {
            width: 100%;
            height: 520px;
            display: block;
            background: linear-gradient(180deg, #1e40af 0%, #1e3a8a 100%);
            touch-action: manipulation;
        }
        
        .countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 30px rgba(255,255,255,0.8);
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="game-container">
        <!-- Header -->
        <div class="bg-slate-900 px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-x-2">
                <div class="w-8 h-8 bg-orange-500 rounded-xl flex items-center justify-center">🦅</div>
                <div>
                    <div class="font-bold">EAGLE STRIKE</div>
                    <div class="text-[10px] text-orange-400 -mt-1">VETS RUSH • SLOWER MODE</div>
                </div>
            </div>
            <div class="text-right">
                <div class="font-mono text-sm font-bold text-yellow-400" id="score">0</div>
                <div class="text-[9px] text-slate-400">SCORE</div>
            </div>
        </div>
        
        <!-- Game Canvas -->
        <div class="relative">
            <canvas id="gameCanvas" width="420" height="520"></canvas>
            
            <!-- Countdown Overlay -->
            <div id="countdown" class="countdown hidden"></div>
            
            <!-- Shield Indicator -->
            <div id="shield-indicator" class="hidden absolute top-4 right-4 bg-blue-500 text-white text-xs px-3 py-1 rounded-full flex items-center gap-x-1">
                <i class="fa-solid fa-shield-halved"></i>
                <span>SHIELD</span>
            </div>
        </div>
        
        <!-- Controls -->
        <div class="bg-slate-900 p-4 flex gap-3">
            <button id="climb-btn" 
                    class="flex-1 bg-yellow-500 hover:bg-yellow-600 active:bg-yellow-700 text-black font-bold py-4 rounded-2xl flex items-center justify-center gap-x-2 text-lg">
                <i class="fa-solid fa-arrow-up"></i>
                <span>CLIMB</span>
            </button>
            
            <button onclick="restartGame()" 
                    class="bg-slate-700 hover:bg-slate-600 px-5 rounded-2xl">
                <i class="fa-solid fa-redo text-xl"></i>
            </button>
        </div>
        
        <!-- Game Over Screen -->
        <div id="game-over" class="hidden bg-slate-900 p-6 text-center">
            <div class="text-6xl mb-4">💥</div>
            <div class="text-3xl font-bold mb-2">MISSION FAILED</div>
            <div class="text-slate-400 mb-6">Your F-16 was shot down</div>
            
            <div class="bg-slate-800 rounded-2xl p-4 mb-6 text-left">
                <div class="flex justify-between py-2 border-b border-slate-700">
                    <span class="text-slate-400">DISTANCE</span>
                    <span class="font-mono font-bold" id="final-distance">0m</span>
                </div>
                <div class="flex justify-between py-2 border-b border-slate-700">
                    <span class="text-slate-400">MEDALS COLLECTED</span>
                    <span class="font-mono font-bold" id="final-medals">0</span>
                </div>
                <div class="flex justify-between py-2 border-b border-slate-700">
                    <span class="text-slate-400">ENEMIES DESTROYED</span>
                    <span class="font-mono font-bold" id="final-enemies">0</span>
                </div>
                <div class="flex justify-between py-3 text-emerald-400 font-bold">
                    <span>REWARDS</span>
                    <span id="final-rewards">+0 🪙 +0 ⭐</span>
                </div>
            </div>
            
            <button onclick="claimRewards()" 
                    class="w-full bg-emerald-600 hover:bg-emerald-700 font-bold py-4 rounded-2xl mb-3">
                CLAIM REWARDS
            </button>
            
            <button onclick="returnToVetsRush()" 
                    class="w-full bg-slate-700 hover:bg-slate-600 font-bold py-4 rounded-2xl">
                RETURN TO VETS RUSH
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameRunning = false;
        let score = 0;
        let distance = 0;
        let medals = 0;
        let enemiesDestroyed = 0;
        let lives = 3;
        let shieldActive = false;
        let shieldTime = 0;
        
        let player = { x: 210, y: 260, vy: 0 };
        let enemies = [];
        let missiles = [];
        let powerups = [];
        let particles = [];
        
        let lastEnemySpawn = 0;
        let lastMissile = 0;
        let gameStartTime = 0;
        
        const keys = {};
        
        // Load earned rewards from this session
        let earnedCoins = 0;
        let earnedStars = 0;
        
        function startGame() {
            gameRunning = true;
            score = 0;
            distance = 0;
            medals = 0;
            enemiesDestroyed = 0;
            lives = 3;
            shieldActive = true;
            shieldTime = Date.now() + 4500; // 4.5 seconds shield
            
            player = { x: 210, y: 260, vy: 0 };
            enemies = [];
            missiles = [];
            powerups = [];
            particles = [];
            
            earnedCoins = 0;
            earnedStars = 0;
            
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('shield-indicator').classList.remove('hidden');
            
            // Countdown
            const countdown = document.getElementById('countdown');
            countdown.classList.remove('hidden');
            countdown.style.fontSize = '72px';
            
            let count = 3;
            countdown.innerText = count;
            
            const countdownInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdown.innerText = count;
                } else {
                    countdown.innerText = 'GO!';
                    countdown.style.fontSize = '48px';
                    
                    setTimeout(() => {
                        countdown.classList.add('hidden');
                        gameStartTime = Date.now();
                        requestAnimationFrame(gameLoop);
                    }, 600);
                    
                    clearInterval(countdownInterval);
                }
            }, 800);
        }
        
        function endGame() {
            gameRunning = false;
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('shield-indicator').classList.add('hidden');
            
            // Calculate rewards
            earnedCoins = Math.floor(distance * 1.8) + (enemiesDestroyed * 25);
            earnedStars = Math.floor(medals * 0.5) + (enemiesDestroyed > 8 ? 1 : 0);
            
            document.getElementById('final-distance').innerText = Math.floor(distance) + 'm';
            document.getElementById('final-medals').innerText = medals;
            document.getElementById('final-enemies').innerText = enemiesDestroyed;
            document.getElementById('final-rewards').innerHTML = `+${earnedCoins} 🪙 +${earnedStars} ⭐`;
            
            // Save pending rewards
            localStorage.setItem('eagle_strike_pending_coins', earnedCoins);
            localStorage.setItem('eagle_strike_pending_stars', earnedStars);
        }
        
        function claimRewards() {
            // Rewards already saved to localStorage
            window.location.href = 'https://vets-rush.vercel.app';
        }
        
        function returnToVetsRush() {
            // Save any earned rewards
            if (earnedCoins > 0 || earnedStars > 0) {
                localStorage.setItem('eagle_strike_pending_coins', earnedCoins);
                localStorage.setItem('eagle_strike_pending_stars', earnedStars);
            }
            window.location.href = 'https://vets-rush.vercel.app';
        }
        
        function spawnEnemy() {
            const types = ['drone', 'fighter', 'helicopter', 'bomber'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            let y = Math.random() * 300 + 50;
            
            enemies.push({
                x: 450,
                y: y,
                type: type,
                vy: type === 'helicopter' ? Math.sin(Date.now() / 200) * 1.5 : 0,
                health: type === 'bomber' ? 2 : 1,
                lastBomb: Date.now()
            });
        }
        
        function spawnPowerup() {
            const types = ['shield', 'double'];
            powerups.push({
                x: 450,
                y: Math.random() * 400 + 60,
                type: types[Math.floor(Math.random() * types.length)]
            });
        }
        
        function update() {
            if (!gameRunning) return;
            
            // Update distance
            distance += 0.8;
            document.getElementById('score').innerText = Math.floor(score);
            
            // Shield timer
            if (shieldActive && Date.now() > shieldTime) {
                shieldActive = false;
                document.getElementById('shield-indicator').classList.add('hidden');
            }
            
            // Player physics
            if (keys['ArrowUp'] || keys[' '] || mouseDown) {
                player.vy = Math.max(player.vy - 0.6, -4.5);
            } else {
                player.vy = Math.min(player.vy + 0.35, 5);
            }
            
            player.y += player.vy;
            player.y = Math.max(40, Math.min(480, player.y));
            
            // Spawn enemies
            if (Date.now() - lastEnemySpawn > 1150) {
                spawnEnemy();
                lastEnemySpawn = Date.now();
                
                if (Math.random() < 0.12) spawnPowerup();
            }
            
            // Update enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.x -= (e.type === 'bomber' ? 1.2 : 2.8);
                
                if (e.type === 'helicopter') {
                    e.y += Math.sin(Date.now() / 300) * 1.2;
                }
                if (e.type === 'fighter') {
                    e.y += Math.sin(Date.now() / 180) * 1.8;
                }
                
                // Bomber drops bombs
                if (e.type === 'bomber' && Date.now() - e.lastBomb > 1800) {
                    missiles.push({
                        x: e.x,
                        y: e.y + 15,
                        vy: 3.5,
                        isBomb: true
                    });
                    e.lastBomb = Date.now();
                }
                
                // Collision with player
                if (!shieldActive && 
                    e.x < player.x + 28 && e.x > player.x - 28 &&
                    e.y < player.y + 22 && e.y > player.y - 22) {
                    
                    if (e.health > 1) {
                        e.health--;
                    } else {
                        enemies.splice(i, 1);
                        createExplosion(e.x, e.y);
                        lives--;
                        
                        if (lives <= 0) {
                            endGame();
                            return;
                        }
                    }
                }
                
                if (e.x < -30) enemies.splice(i, 1);
            }
            
            // Update missiles
            for (let i = missiles.length - 1; i >= 0; i--) {
                const m = missiles[i];
                m.x -= 5.5;
                if (m.isBomb) m.y += m.vy;
                
                // Collision with player
                if (!shieldActive && 
                    m.x < player.x + 25 && m.x > player.x - 25 &&
                    m.y < player.y + 18 && m.y > player.y - 18) {
                    
                    missiles.splice(i, 1);
                    createExplosion(player.x, player.y);
                    lives--;
                    
                    if (lives <= 0) {
                        endGame();
                        return;
                    }
                }
                
                if (m.x < -20) missiles.splice(i, 1);
            }
            
            // Update powerups
            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i];
                p.x -= 2.2;
                
                if (p.x < player.x + 30 && p.x > player.x - 30 &&
                    p.y < player.y + 25 && p.y > player.y - 25) {
                    
                    if (p.type === 'shield') {
                        shieldActive = true;
                        shieldTime = Date.now() + 6000;
                        document.getElementById('shield-indicator').classList.remove('hidden');
                    } else if (p.type === 'double') {
                        // Double fire for 8 seconds
                        window.doubleFireUntil = Date.now() + 8000;
                    }
                    
                    powerups.splice(i, 1);
                    createExplosion(p.x, p.y, '#22c55e');
                }
                
                if (p.x < -20) powerups.splice(i, 1);
            }
            
            // Auto-fire missiles
            if (Date.now() - lastMissile > (window.doubleFireUntil > Date.now() ? 180 : 380)) {
                missiles.push({
                    x: player.x + 25,
                    y: player.y - 5,
                    vy: 0,
                    isPlayer: true
                });
                lastMissile = Date.now();
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            // Check collisions with player missiles
            for (let i = missiles.length - 1; i >= 0; i--) {
                const m = missiles[i];
                if (!m.isPlayer) continue;
                
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    
                    if (m.x < e.x + 22 && m.x > e.x - 22 &&
                        m.y < e.y + 18 && m.y > e.y - 18) {
                        
                        missiles.splice(i, 1);
                        e.health--;
                        
                        if (e.health <= 0) {
                            enemies.splice(j, 1);
                            createExplosion(e.x, e.y);
                            enemiesDestroyed++;
                            score += 25;
                            
                            // Chance to drop medal
                            if (Math.random() < 0.35) {
                                medals++;
                                score += 50;
                            }
                        }
                        break;
                    }
                }
            }
        }
        
        function createExplosion(x, y, color = '#ef4444') {
            for (let i = 0; i < 18; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    life: 28 + Math.random() * 12,
                    color: color
                });
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background grid
            ctx.strokeStyle = 'rgba(148, 163, 184, 0.15)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            // Draw player (F-16)
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Body
            ctx.fillStyle = '#64748b';
            ctx.beginPath();
            ctx.ellipse(0, 0, 26, 9, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Wings
            ctx.fillStyle = '#475569';
            ctx.beginPath();
            ctx.moveTo(-8, 0);
            ctx.lineTo(-22, -18);
            ctx.lineTo(-22, 18);
            ctx.fill();
            
            // Nose
            ctx.fillStyle = '#334155';
            ctx.beginPath();
            ctx.moveTo(26, 0);
            ctx.lineTo(38, -4);
            ctx.lineTo(38, 4);
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = '#0ea5e9';
            ctx.beginPath();
            ctx.ellipse(8, 0, 7, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Afterburner
            if (player.vy < -1) {
                ctx.fillStyle = '#f59e0b';
                ctx.beginPath();
                ctx.moveTo(-26, -3);
                ctx.lineTo(-38, 0);
                ctx.lineTo(-26, 3);
                ctx.fill();
            }
            
            ctx.restore();
            
            // Shield
            if (shieldActive) {
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(player.x, player.y, 38, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.fillStyle = 'rgba(59, 130, 246, 0.2)';
                ctx.beginPath();
                ctx.arc(player.x, player.y, 36, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw enemies
            for (const e of enemies) {
                ctx.save();
                ctx.translate(e.x, e.y);
                
                if (e.type === 'drone') {
                    // Red drone
                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect(-12, -12, 24, 24);
                    ctx.fillStyle = '#b91c1c';
                    ctx.fillRect(-6, -6, 12, 12);
                    ctx.fillStyle = '#fbbf24';
                    ctx.fillRect(-3, -3, 6, 6);
                } else if (e.type === 'fighter') {
                    // Red fighter jet
                    ctx.fillStyle = '#b91c1c';
                    ctx.beginPath();
                    ctx.moveTo(18, 0);
                    ctx.lineTo(-14, -10);
                    ctx.lineTo(-14, 10);
                    ctx.fill();
                    ctx.fillStyle = '#991b1b';
                    ctx.fillRect(-8, -4, 16, 8);
                } else if (e.type === 'helicopter') {
                    // Green helicopter
                    ctx.fillStyle = '#16a34a';
                    ctx.fillRect(-14, -8, 28, 16);
                    ctx.fillStyle = '#15803d';
                    ctx.fillRect(-6, -14, 12, 6);
                    ctx.fillStyle = '#4ade80';
                    ctx.fillRect(-18, -2, 8, 4);
                } else if (e.type === 'bomber') {
                    // Dark gray bomber
                    ctx.fillStyle = '#334155';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 22, 10, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#1e2937';
                    ctx.fillRect(-10, -3, 20, 6);
                }
                
                ctx.restore();
            }
            
            // Draw missiles
            for (const m of missiles) {
                ctx.fillStyle = m.isPlayer ? '#22c55e' : '#ef4444';
                ctx.fillRect(m.x - 6, m.y - 2, 12, 4);
                
                if (m.isPlayer) {
                    ctx.fillStyle = '#4ade80';
                    ctx.fillRect(m.x - 10, m.y - 1, 5, 2);
                }
            }
            
            // Draw powerups
            for (const p of powerups) {
                ctx.fillStyle = p.type === 'shield' ? '#3b82f6' : '#eab308';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 9, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 12px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(p.type === 'shield' ? '🛡️' : '⚡', p.x, p.y + 4);
            }
            
            // Draw particles
            for (const p of particles) {
                ctx.globalAlpha = p.life / 35;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
            }
            ctx.globalAlpha = 1;
            
            // Draw lives
            ctx.fillStyle = '#ef4444';
            for (let i = 0; i < lives; i++) {
                ctx.fillRect(15 + i * 22, 15, 16, 16);
            }
            
            // Distance
            ctx.fillStyle = 'white';
            ctx.font = 'bold 13px Inter';
            ctx.fillText(Math.floor(distance) + 'm', 15, 45);
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            update();
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        let mouseDown = false;
        
        function setupControls() {
            const climbBtn = document.getElementById('climb-btn');
            
            climbBtn.addEventListener('mousedown', () => mouseDown = true);
            climbBtn.addEventListener('mouseup', () => mouseDown = false);
            climbBtn.addEventListener('mouseleave', () => mouseDown = false);
            
            climbBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                mouseDown = true;
            });
            climbBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                mouseDown = false;
            });
            
            document.addEventListener('keydown', (e) => keys[e.key] = true);
            document.addEventListener('keyup', (e) => keys[e.key] = false);
            
            // Tap anywhere to climb (mobile friendly)
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                mouseDown = true;
            });
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                mouseDown = false;
            });
        }
        
        function restartGame() {
            startGame();
        }
        
        // Initialize
        function init() {
            setupControls();
            startGame();
        }
        
        window.onload = init;
    </script>
</body>
</html>
