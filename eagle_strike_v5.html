<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EAGLE STRIKE 🦅 | VETS RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; background: linear-gradient(180deg, #0f172a 0%, #1e3a8a 100%); color: white; }
        .game-canvas { border: 4px solid #1e40af; border-radius: 16px; box-shadow: 0 0 30px rgba(59, 130, 246, 0.5); touch-action: none; }
        .stat { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="bg-slate-950 text-white">
    <!-- Header -->
    <div class="bg-slate-900 border-b border-slate-700 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-orange-500 rounded-2xl flex items-center justify-center text-2xl">🦅</div>
            <div>
                <div class="font-bold text-2xl tracking-tighter text-orange-400">EAGLE STRIKE</div>
                <div class="text-[10px] text-slate-400 -mt-1">PROTECT THE SKIES • HOMES FOR VETS</div>
            </div>
        </div>
        <div class="flex items-center gap-x-2">
            <div class="bg-slate-800 px-3 py-1 rounded-2xl text-sm flex items-center gap-x-1">
                <span class="text-yellow-400">🪙</span>
                <span id="header-coins" class="font-mono font-bold">3,277,350</span>
            </div>
            <button onclick="exitToBase()" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-2xl text-sm flex items-center gap-x-1">
                <i class="fa-solid fa-home"></i>
                <span>BASE</span>
            </button>
        </div>
    </div>

    <!-- Game Container -->
    <div class="max-w-md mx-auto pt-4 px-4">
        <!-- Mission Info -->
        <div class="flex justify-between items-center mb-3 px-1">
            <div>
                <div class="text-sm text-orange-400">MISSION: SKY DEFENSE</div>
                <div class="text-xs text-slate-400">Shield: <span id="shield-count" class="font-bold text-emerald-400">3</span> • Score: <span id="score" class="font-mono font-bold">0</span></div>
            </div>
            <div class="text-right">
                <div class="text-[10px] text-slate-400">HIGH SCORE</div>
                <div id="high-score" class="font-mono text-lg font-bold text-amber-400">12,450</div>
            </div>
        </div>

        <!-- Game Canvas -->
        <div class="relative">
            <canvas id="game-canvas" width="380" height="520" class="game-canvas mx-auto bg-[#0a1625]"></canvas>
            
            <!-- Hold to Climb Hint -->
            <div id="climb-hint" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/70 text-white text-xs px-4 py-1.5 rounded-full flex items-center gap-x-2 pointer-events-none">
                <i class="fa-solid fa-hand-paper"></i>
                <span>HOLD ANYWHERE TO CLIMB</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="mt-4 text-center">
            <div class="flex gap-2 justify-center">
                <button id="start-btn" onclick="startGame()" 
                        class="flex-1 max-w-[160px] bg-orange-500 hover:bg-orange-600 text-white font-bold py-3.5 rounded-2xl text-lg flex items-center justify-center gap-x-2 shadow-lg">
                    <i class="fa-solid fa-play"></i>
                    <span>TAKE OFF</span>
                </button>
                <button onclick="exitToBase()" 
                        class="flex-1 max-w-[120px] bg-slate-700 hover:bg-slate-600 text-white font-bold py-3.5 rounded-2xl text-lg flex items-center justify-center gap-x-2">
                    <i class="fa-solid fa-sign-out-alt"></i>
                    <span>ABORT</span>
                </button>
            </div>
        </div>

        <!-- Rewards Preview -->
        <div class="mt-3 bg-slate-900 rounded-2xl p-3 text-xs border border-slate-700">
            <div class="flex justify-between text-slate-400">
                <div>Per 100m: <span class="text-emerald-400">+250 🪙</span></div>
                <div>Stars: <span class="text-yellow-400">+50 each</span></div>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div class="bg-slate-900 rounded-3xl p-6 max-w-[320px] w-full mx-4 border border-orange-500">
            <div class="text-center">
                <div class="text-6xl mb-2">🦅</div>
                <div class="text-2xl font-bold text-orange-400 mb-1">MISSION COMPLETE</div>
                <div class="text-sm text-slate-400 mb-4">You protected the skies, Patriot!</div>
                
                <div class="bg-slate-800 rounded-2xl p-4 mb-4">
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <div class="text-left">Distance Flown</div>
                        <div class="text-right font-mono text-emerald-400" id="final-distance">0m</div>
                        <div class="text-left">Stars Collected</div>
                        <div class="text-right font-mono text-yellow-400" id="final-stars">0</div>
                        <div class="text-left font-bold">TOTAL REWARD</div>
                        <div class="text-right font-mono text-xl font-bold text-yellow-400" id="final-reward">0 🪙</div>
                    </div>
                </div>

                <button onclick="restartMission()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-2xl mb-2 flex items-center justify-center gap-x-2">
                    <i class="fa-solid fa-redo"></i>
                    <span>FLY AGAIN</span>
                </button>
                <button onclick="exitToBase()" 
                        class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-2xl flex items-center justify-center gap-x-2">
                    <i class="fa-solid fa-home"></i>
                    <span>RETURN TO BASE</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== SHARED STATE ====================
        let gameState = {
            heroCoins: 3277350, stars: 0, torpedoes: 0, freedom: 3, valor: 0,
            flags: 0, helmets: 0, medals: 0, homes: 12, beds: 0
        };

        function loadGameState() {
            const saved = localStorage.getItem('vetsRushGameState');
            if (saved) {
                try { gameState = { ...gameState, ...JSON.parse(saved) }; } catch (e) {}
            }
            updateHeader();
        }

        function saveGameState() {
            localStorage.setItem('vetsRushGameState', JSON.stringify(gameState));
        }

        function updateHeader() {
            const el = document.getElementById('header-coins');
            if (el) el.innerText = gameState.heroCoins.toLocaleString();
        }

        // ==================== GAME STATE ====================
        let canvas, ctx;
        let eagle = { x: 90, y: 260, vy: 0, size: 28 };
        let obstacles = [], collectibles = [], particles = [];
        let score = 0, distance = 0, shields = 3, frame = 0;
        let gameRunning = false, isClimbing = false;
        let highScore = 12450;
        let lastFrameTime = 0;

        const GRAVITY = 0.38;
        const CLIMB_FORCE = -0.92;
        const MAX_SPEED = 9.5;

        function initCanvas() {
            canvas = document.getElementById('game-canvas');
            ctx = canvas.getContext('2d');

            // Load high score
            const savedHigh = localStorage.getItem('eagleStrikeHighScore');
            if (savedHigh) highScore = parseInt(savedHigh);
            document.getElementById('high-score').innerText = highScore.toLocaleString();

            // Robust controls - works on desktop + mobile
            const setClimb = (state) => {
                if (gameRunning) isClimbing = state;
            };

            // Mouse
            canvas.addEventListener('mousedown', () => setClimb(true));
            window.addEventListener('mouseup', () => setClimb(false));
            canvas.addEventListener('mouseleave', () => setClimb(false));

            // Touch
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                setClimb(true);
            }, { passive: false });
            window.addEventListener('touchend', (e) => {
                e.preventDefault();
                setClimb(false);
            }, { passive: false });

            // Keyboard (Space / Click anywhere)
            document.addEventListener('keydown', (e) => {
                if ((e.key === ' ' || e.key === 'Spacebar') && gameRunning) {
                    e.preventDefault();
                    isClimbing = true;
                }
            });
            document.addEventListener('keyup', (e) => {
                if ((e.key === ' ' || e.key === 'Spacebar') && gameRunning) isClimbing = false;
            });

            // Tap canvas to start or climb
            canvas.addEventListener('click', () => {
                if (!gameRunning) {
                    startGame();
                } else {
                    isClimbing = true;
                    setTimeout(() => { if (gameRunning) isClimbing = false; }, 180);
                }
            });

            // Hide hint after first interaction
            const hint = document.getElementById('climb-hint');
            const hideHint = () => {
                if (hint) hint.style.opacity = '0';
                setTimeout(() => { if (hint) hint.style.display = 'none'; }, 300);
            };
            canvas.addEventListener('mousedown', hideHint, { once: true });
            canvas.addEventListener('touchstart', hideHint, { once: true });
        }

        function resetGame() {
            eagle = { x: 90, y: 260, vy: 0, size: 28 };
            obstacles = [];
            collectibles = [];
            particles = [];
            score = 0;
            distance = 0;
            shields = 3;
            frame = 0;
            isClimbing = false;
            gameRunning = false;

            document.getElementById('score').innerText = '0';
            document.getElementById('shield-count').innerText = '3';
            document.getElementById('game-over-modal').classList.add('hidden');
            document.getElementById('start-btn').innerHTML = `<i class="fa-solid fa-play"></i> <span>TAKE OFF</span>`;
            document.getElementById('start-btn').disabled = false;
        }

        function startGame() {
            if (gameRunning) return;

            resetGame();
            gameRunning = true;
            isClimbing = false;

            const btn = document.getElementById('start-btn');
            btn.innerHTML = `<i class="fa-solid fa-plane"></i> <span>IN FLIGHT</span>`;
            btn.disabled = true;

            // Initial spawns
            for (let i = 0; i < 4; i++) spawnObstacle();
            for (let i = 0; i < 3; i++) spawnCollectible();

            lastFrameTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function spawnObstacle() {
            const types = ['drone', 'cloud', 'lightning'];
            const type = types[Math.floor(Math.random() * types.length)];
            obstacles.push({
                x: canvas.width + 50,
                y: 70 + Math.random() * (canvas.height - 160),
                width: type === 'cloud' ? 68 : 40,
                height: type === 'cloud' ? 42 : 30,
                type,
                speed: 2.4 + Math.random() * 1.6,
                passed: false
            });
        }

        function spawnCollectible() {
            const types = ['star', 'flag', 'coin'];
            const type = types[Math.floor(Math.random() * types.length)];
            collectibles.push({
                x: canvas.width + 35,
                y: 90 + Math.random() * (canvas.height - 180),
                type,
                size: 20,
                speed: 2.8,
                value: type === 'star' ? 55 : type === 'flag' ? 35 : 25
            });
        }

        function createExplosion(x, y, color = '#f59e0b') {
            for (let i = 0; i < 14; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 7,
                    vy: (Math.random() - 0.5) * 7 - 1,
                    life: 16 + Math.random() * 14,
                    color,
                    size: 2.5 + Math.random() * 3.5
                });
            }
        }

        function gameLoop() {
            if (!gameRunning) return;

            const now = performance.now();
            const delta = Math.min((now - lastFrameTime) / 16.67, 2); // cap delta
            lastFrameTime = now;

            // Background
            ctx.fillStyle = '#0a1625';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1e3a8a';
            ctx.fillRect(0, 0, canvas.width, canvas.height * 0.55);

            // Scrolling clouds
            ctx.fillStyle = 'rgba(148, 163, 184, 0.12)';
            for (let i = 0; i < 6; i++) {
                const cx = ((frame * 0.25 + i * 95) % (canvas.width + 180)) - 90;
                ctx.beginPath();
                ctx.ellipse(cx, 75 + i * 22, 48, 19, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // === EAGLE PHYSICS (with delta) ===
            if (isClimbing) {
                eagle.vy += CLIMB_FORCE * delta;
            } else {
                eagle.vy += GRAVITY * delta;
            }
            eagle.vy = Math.max(Math.min(eagle.vy, MAX_SPEED), -MAX_SPEED);
            eagle.y += eagle.vy * delta;

            // Bounds
            if (eagle.y < 28) { eagle.y = 28; eagle.vy = 0; }
            if (eagle.y > canvas.height - 42) { eagle.y = canvas.height - 42; eagle.vy = 0; }

            // Draw Eagle
            ctx.save();
            ctx.translate(eagle.x, eagle.y);
            
            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.45)';
            ctx.beginPath();
            ctx.ellipse(5, 9, 16, 6, 0, 0, Math.PI * 2);
            ctx.fill();

            // Body
            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            ctx.ellipse(0, 0, 20, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // Wing
            ctx.fillStyle = '#d97706';
            ctx.beginPath();
            ctx.moveTo(-6, -1);
            ctx.quadraticCurveTo(-20, -16, -4, -5);
            ctx.fill();

            // Head
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath();
            ctx.arc(15, -1, 7, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#dc2626';
            ctx.beginPath();
            ctx.moveTo(20, -1);
            ctx.lineTo(27, 1);
            ctx.lineTo(20, 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = '#111827';
            ctx.beginPath();
            ctx.arc(17, -2, 2.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // === OBSTACLES ===
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= obs.speed * delta;

                // Draw
                if (obs.type === 'drone') {
                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.fillStyle = '#b91c1c';
                    ctx.fillRect(obs.x + 7, obs.y + 7, obs.width - 14, obs.height - 14);
                } else if (obs.type === 'cloud') {
                    ctx.fillStyle = '#475569';
                    ctx.beginPath();
                    ctx.ellipse(obs.x + 22, obs.y + 16, 28, 16, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(obs.x + 42, obs.y + 11, 22, 13, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else if (obs.type === 'lightning') {
                    ctx.fillStyle = '#eab308';
                    ctx.fillRect(obs.x + 11, obs.y, 7, obs.height);
                    ctx.fillStyle = '#f59e0b';
                    ctx.fillRect(obs.x + 7, obs.y + 10, 15, 5);
                }

                // Collision
                if (checkCollision(eagle, obs)) {
                    createExplosion(eagle.x + 8, eagle.y, '#ef4444');
                    shields--;
                    document.getElementById('shield-count').innerText = shields;
                    obstacles.splice(i, 1);
                    spawnObstacle();

                    if (shields <= 0) {
                        endGame();
                        return;
                    }
                }

                // Passed score
                if (!obs.passed && obs.x + obs.width < eagle.x - 10) {
                    obs.passed = true;
                    score += 12;
                    distance += 28;
                    document.getElementById('score').innerText = score;
                }

                if (obs.x < -90) obstacles.splice(i, 1);
            }

            if (frame % 32 === 0 && Math.random() > 0.35) spawnObstacle();

            // === COLLECTIBLES ===
            for (let i = collectibles.length - 1; i >= 0; i--) {
                const col = collectibles[i];
                col.x -= col.speed * delta;

                ctx.font = 'bold 22px Inter';
                ctx.textAlign = 'center';
                if (col.type === 'star') ctx.fillText('⭐', col.x, col.y + 7);
                else if (col.type === 'flag') ctx.fillText('🇺🇸', col.x, col.y + 7);
                else ctx.fillText('🪙', col.x, col.y + 7);

                // Collect
                const dx = eagle.x - col.x;
                const dy = eagle.y - col.y;
                if (Math.hypot(dx, dy) < 26) {
                    score += col.value;
                    if (col.type === 'star') gameState.stars += 1;
                    if (col.type === 'flag') gameState.flags += 1;
                    if (col.type === 'coin') gameState.heroCoins += 28;

                    createExplosion(col.x, col.y, '#fbbf24');
                    collectibles.splice(i, 1);
                    document.getElementById('score').innerText = score;
                    updateHeader();
                    saveGameState();
                }

                if (col.x < -40) collectibles.splice(i, 1);
            }

            if (frame % 48 === 0) spawnCollectible();

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * delta;
                p.y += p.vy * delta;
                p.life -= delta;
                p.vy += 0.09 * delta;
                ctx.globalAlpha = Math.max(p.life / 22, 0);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1;

            // Distance progress
            distance += 0.9 * delta;
            if (frame % 7 === 0) {
                document.getElementById('score').innerText = score;
            }

            frame++;
            requestAnimationFrame(gameLoop);
        }

        function checkCollision(e, o) {
            return !(e.x + e.size < o.x || e.x > o.x + o.width ||
                     e.y + e.size < o.y || e.y > o.y + o.height);
        }

        function endGame() {
            gameRunning = false;
            isClimbing = false;

            const btn = document.getElementById('start-btn');
            btn.innerHTML = `<i class="fa-solid fa-play"></i> <span>TAKE OFF</span>`;
            btn.disabled = false;

            const rewardCoins = Math.floor(distance * 2.6) + Math.floor(score * 7.5);
            const bonusStars = Math.floor(score / 38);
            const bonusFlags = Math.floor(distance / 165);

            gameState.heroCoins += Math.max(rewardCoins, 150);
            gameState.stars += Math.max(bonusStars, 0);
            gameState.flags += Math.max(bonusFlags, 0);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('eagleStrikeHighScore', highScore);
                document.getElementById('high-score').innerText = highScore.toLocaleString();
            }

            saveGameState();
            updateHeader();

            document.getElementById('final-distance').innerText = Math.floor(distance) + 'm';
            document.getElementById('final-stars').innerText = bonusStars;
            document.getElementById('final-reward').innerText = rewardCoins.toLocaleString() + ' 🪙';
            document.getElementById('game-over-modal').classList.remove('hidden');

            // Victory particles
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    createExplosion(Math.random() * canvas.width, 50 + Math.random() * 70,
                        ['#fbbf24', '#22c55e', '#3b82f6'][Math.floor(Math.random() * 3)]);
                }, i * 6);
            }
        }

        function restartMission() {
            document.getElementById('game-over-modal').classList.add('hidden');
            startGame();
        }

        function exitToBase() {
            if (gameRunning) {
                const partial = Math.floor(distance * 1.4) + 80;
                gameState.heroCoins += partial;
                saveGameState();
            }
            if (window.opener) window.opener.focus();
            window.close();
        }

        function boot() {
            loadGameState();
            initCanvas();
            resetGame();

            // Auto-hide hint after 4 seconds if not interacted
            setTimeout(() => {
                const hint = document.getElementById('climb-hint');
                if (hint && hint.style.display !== 'none') {
                    hint.style.transition = 'opacity 0.4s';
                    hint.style.opacity = '0';
                    setTimeout(() => { if (hint) hint.style.display = 'none'; }, 400);
                }
            }, 4200);

            // Easter egg: triple-click header for test coins
            let clicks = 0;
            document.querySelector('.bg-slate-900').addEventListener('click', () => {
                clicks++;
                if (clicks === 3) {
                    gameState.heroCoins += 2500;
                    saveGameState();
                    updateHeader();
                    clicks = 0;
                }
                setTimeout(() => clicks = 0, 800);
            });
        }

        window.onload = boot;
    </script>
</body>
</html>
