<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EAGLE STRIKE 🦅 | VETS RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="game-state.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Press+Start+2P&amp;display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #1e2937 100%);
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        
        .game-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            background: #0f172a;
            box-shadow: 0 0 0 12px #1e2937;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
        }
        
        #gameCanvas {
            width: 100%;
            height: 520px;
            display: block;
            background: linear-gradient(180deg, #1e40af 0%, #1e3a8a 100%);
            touch-action: manipulation;
        }
        
        .countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 30px rgba(255,255,255,0.8);
            z-index: 100;
            pointer-events: none;
        }
        
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="game-container">
        <!-- Header -->
        <div class="bg-slate-900 px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center">
                    <i class="fas fa-fighter-jet text-white text-2xl"></i>
                </div>
                <div>
                    <div class="font-bold text-xl">EAGLE STRIKE</div>
                    <div class="text-xs text-orange-400">VETS RUSH • MISSION MODE</div>
                </div>
            </div>
            <div class="text-right">
                <div class="text-xs text-slate-400">HIGH SCORE</div>
                <div id="highScore" class="font-mono font-bold text-lg text-amber-400">12,450</div>
            </div>
        </div>

        <!-- Game Canvas -->
        <div class="relative">
            <canvas id="gameCanvas" width="420" height="520"></canvas>
            
            <!-- Countdown Overlay -->
            <div id="countdown" class="countdown hidden">3</div>
            
            <!-- Game Over Screen -->
            <div id="gameOverScreen" class="game-over hidden">
                <div class="text-center p-6 w-full max-w-[300px]">
                    <div class="text-6xl mb-4">💥</div>
                    <div class="text-3xl font-bold mb-2">MISSION FAILED</div>
                    <div class="text-slate-400 mb-6">Your F-16 was shot down</div>
                    
                    <div class="bg-slate-800 rounded-2xl p-4 mb-6">
                        <div class="flex justify-between items-center mb-3">
                            <div class="text-sm text-slate-400">DISTANCE FLOWN</div>
                            <div id="finalDistance" class="font-mono font-bold text-xl">1,240m</div>
                        </div>
                        <div class="flex justify-between items-center mb-3">
                            <div class="text-sm text-slate-400">MEDALS COLLECTED</div>
                            <div id="finalMedals" class="font-mono font-bold text-xl text-amber-400">8</div>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="text-sm text-slate-400">ENEMIES DESTROYED</div>
                            <div id="finalKills" class="font-mono font-bold text-xl text-red-400">14</div>
                        </div>
                    </div>
                    
                    <div class="bg-gradient-to-r from-amber-500 to-yellow-500 rounded-2xl p-4 mb-4">
                        <div class="text-sm text-slate-900 font-bold mb-1">REWARDS EARNED</div>
                        <div class="flex justify-center items-center gap-4 text-slate-900">
                            <div>
                                <div class="text-2xl font-bold">+<span id="rewardCoins">1,850</span></div>
                                <div class="text-xs">Hero Coins 🪙</div>
                            </div>
                            <div>
                                <div class="text-2xl font-bold">+<span id="rewardStars">4</span></div>
                                <div class="text-xs">Stars ⭐</div>
                            </div>
                        </div>
                    </div>
                    
                    <button onclick="restartGame()" 
                            class="w-full bg-white text-slate-900 font-bold py-4 rounded-2xl text-lg flex items-center justify-center gap-2 hover:bg-amber-100 transition-colors">
                        <i class="fas fa-redo mr-2"></i> FLY AGAIN
                    </button>
                    
                    <button onclick="claimRewards()" 
                            class="w-full mt-3 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-2xl text-lg flex items-center justify-center gap-2 transition-colors">
                        <i class="fas fa-gift mr-2"></i> CLAIM REWARDS
                    </button>
                    
                    <button onclick="returnToVetsRush()" 
                            class="w-full mt-3 bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-2xl text-lg flex items-center justify-center gap-2 transition-colors">
                        <i class="fas fa-arrow-left mr-2"></i> RETURN TO VETS RUSH
                    </button>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="bg-slate-900 p-4">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <div class="px-3 py-1 bg-slate-800 rounded-full text-sm flex items-center gap-2">
                        <i class="fas fa-heart text-red-500"></i>
                        <span id="lives">3</span>
                    </div>
                    <div class="px-3 py-1 bg-slate-800 rounded-full text-sm flex items-center gap-2">
                        <i class="fas fa-medal text-amber-400"></i>
                        <span id="medals">0</span>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-xs text-slate-400">SCORE</div>
                    <div id="score" class="font-mono font-bold text-2xl text-white">0</div>
                </div>
            </div>
            
            <!-- Climb Button -->
            <button id="climbBtn"
                    class="w-full h-14 bg-gradient-to-b from-yellow-400 to-amber-500 rounded-2xl flex items-center justify-center text-slate-900 font-bold text-xl active:scale-[0.985] transition-transform shadow-lg"
                    onmousedown="startClimb()" 
                    onmouseup="stopClimb()" 
                    onmouseleave="stopClimb()"
                    ontouchstart="startClimb()" 
                    ontouchend="stopClimb()">
                <div class="flex items-center gap-3">
                    <i class="fas fa-arrow-up text-3xl"></i>
                    <div>
                        <div class="font-black text-xl tracking-wider">CLIMB</div>
                        <div class="text-xs -mt-1 opacity-75">HOLD TO RISE</div>
                    </div>
                </div>
            </button>
            
            <div class="text-center text-xs text-slate-500 mt-2">Tap &amp; hold to climb • Release to dive</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameState = 'menu';
        let score = 0;
        let distance = 0;
        let medals = 0;
        let lives = 3 + extraLives;
        let highScore = (window.game && window.game.highScores && window.game.highScores.eagleStrike) || localStorage.getItem('eagleHighScore') || 12450;
        
        document.getElementById('highScore').textContent = highScore.toLocaleString();
        
        let player = {
            x: 120,
            y: 260,
            vy: 0,
            rotation: 0,
            hasShield: false,
            shieldTime: 0,
            hasDoubleFire: false,
            doubleFireTime: 0
        };
        
        let enemies = [];
        let missiles = [];
        let playerMissiles = [];
        let powerups = [];
        let particles = [];
        let lastEnemySpawn = 0;
        let lastMissileSpawn = 0;
        let lastPowerupSpawn = 0;
        let climbPressed = false;
        let lastShot = 0;
        
        function resetGame() {
            player.x = 120;
            player.y = 260;
            player.vy = 0;
            player.rotation = 0;
            const eagleUpgrades = (window.game && window.game.upgrades) ? window.game.upgrades : {};
            const extraLives = Number(eagleUpgrades.extraLife || window.game.extraLives || 0);
            const shieldBonus = Number(eagleUpgrades.shieldDuration || window.game.shieldDuration || 0) * 1000;

            player.hasShield = true;
            player.shieldTime = Date.now() + 4500 + shieldBonus;
            player.hasDoubleFire = false;
            
            enemies = [];
            missiles = [];
            playerMissiles = [];
            powerups = [];
            particles = [];
            
            score = 0;
            distance = 0;
            medals = 0;
            lives = 3;
            
            document.getElementById('score').textContent = score;
            document.getElementById('medals').textContent = medals;
            document.getElementById('lives').textContent = lives;
            
            lastEnemySpawn = Date.now();
            lastMissileSpawn = Date.now();
            lastPowerupSpawn = Date.now();
            lastShot = Date.now();
        }
        
        function createExplosion(x, y, color = '#f59e0b') {
            for (let i = 0; i < 18; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 7,
                    vy: (Math.random() - 0.5) * 7,
                    life: 30 + Math.random() * 20,
                    color: color,
                    size: 3 + Math.random() * 4
                });
            }
        }
        
        function spawnEnemy() {
            const types = ['drone', 'fighter', 'helicopter', 'bomber'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            enemies.push({
                x: 420,
                y: 80 + Math.random() * 340,
                vx: -2.2 - Math.random() * 1.2,
                vy: (Math.random() - 0.5) * 1.5,
                type: type,
                health: type === 'bomber' ? 2 : 1
            });
        }
        
        function spawnMissile() {
            missiles.push({
                x: 420,
                y: player.y + (Math.random() - 0.5) * 120,
                vx: -4.5,
                vy: 0,
                targetY: player.y
            });
        }
        
        function spawnPowerup() {
            powerups.push({
                x: 420,
                y: 100 + Math.random() * 300,
                vx: -1.8,
                type: Math.random() > 0.5 ? 'shield' : 'double'
            });
        }
        
        function updateGame() {
            if (gameState !== 'playing') return;
            
            if (climbPressed) {
                player.vy = Math.max(player.vy - 0.65, -4.5);
                player.rotation = Math.max(player.rotation - 4, -28);
            } else {
                player.vy = Math.min(player.vy + 0.48, 4.8);
                player.rotation = Math.min(player.rotation + 3.5, 32);
            }
            
            player.y += player.vy;
            player.y = Math.max(35, Math.min(485, player.y));
            
            if (player.hasShield && Date.now() > player.shieldTime) {
                player.hasShield = false;
            }
            
            if (player.hasDoubleFire && Date.now() > player.doubleFireTime) {
                player.hasDoubleFire = false;
            }
            
            const fireRate = player.hasDoubleFire ? 180 : 320;
            if (Date.now() - lastShot > fireRate) {
                playerMissiles.push({
                    x: player.x + 32,
                    y: player.y - 2,
                    vx: 9
                });
                
                if (player.hasDoubleFire) {
                    playerMissiles.push({
                        x: player.x + 32,
                        y: player.y + 6,
                        vx: 9
                    });
                }
                lastShot = Date.now();
            }
            
            for (let i = playerMissiles.length - 1; i >= 0; i--) {
                const m = playerMissiles[i];
                m.x += m.vx;
                
                if (m.x > 430) {
                    playerMissiles.splice(i, 1);
                    continue;
                }
                
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    const dx = m.x - e.x;
                    const dy = m.y - e.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 22) {
                        createExplosion(e.x, e.y, '#ef4444');
                        enemies.splice(j, 1);
                        playerMissiles.splice(i, 1);
                        score += 85;
                        document.getElementById('score').textContent = score;
                        break;
                    }
                }
            }
            
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.x += e.vx;
                e.y += e.vy;
                
                if (e.y < 50 || e.y > 470) e.vy *= -1;
                
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 32) {
                    if (player.hasShield) {
                        createExplosion(e.x, e.y, '#60a5fa');
                        enemies.splice(i, 1);
                        score += 60;
                    } else {
                        createExplosion(player.x, player.y, '#ef4444');
                        lives--;
                        document.getElementById('lives').textContent = lives;
                        
                        if (lives <= 0) {
                            endGame();
                            return;
                        } else {
                            player.hasShield = true;
                            player.shieldTime = Date.now() + 2000;
                            enemies.splice(i, 1);
                        }
                    }
                }
                
                if (e.x < -30) {
                    enemies.splice(i, 1);
                }
            }
            
            for (let i = missiles.length - 1; i >= 0; i--) {
                const m = missiles[i];
                m.x += m.vx;
                
                const dy = player.y - m.y;
                m.vy = dy * 0.035;
                m.y += m.vy;
                
                const dx = player.x - m.x;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 18) {
                    if (player.hasShield) {
                        createExplosion(m.x, m.y, '#60a5fa');
                        missiles.splice(i, 1);
                    } else {
                        createExplosion(player.x, player.y, '#ef4444');
                        lives--;
                        document.getElementById('lives').textContent = lives;
                        
                        if (lives <= 0) {
                            endGame();
                            return;
                        } else {
                            player.hasShield = true;
                            player.shieldTime = Date.now() + 1800;
                            missiles.splice(i, 1);
                        }
                    }
                }
                
                if (m.x < -20) {
                    missiles.splice(i, 1);
                }
            }
            
            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i];
                p.x += p.vx;
                
                const dx = player.x - p.x;
                const dy = player.y - p.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 28) {
                    if (p.type === 'shield') {
                        player.hasShield = true;
                        player.shieldTime = Date.now() + 5500;
                        createExplosion(p.x, p.y, '#60a5fa');
                    } else {
                        player.hasDoubleFire = true;
                        player.doubleFireTime = Date.now() + 6500;
                        createExplosion(p.x, p.y, '#fbbf24');
                    }
                    powerups.splice(i, 1);
                    continue;
                }
                
                if (p.x < -30) {
                    powerups.splice(i, 1);
                }
            }
            
            if (Date.now() - lastEnemySpawn > 820) {
                spawnEnemy();
                lastEnemySpawn = Date.now();
            }
            
            if (Date.now() - lastMissileSpawn > 1450) {
                spawnMissile();
                lastMissileSpawn = Date.now();
            }
            
            if (Date.now() - lastPowerupSpawn > 3800) {
                spawnPowerup();
                lastPowerupSpawn = Date.now();
            }
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vy += 0.12;
                p.vx *= 0.985;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            distance += 1.8;
            score = Math.floor(distance * 0.7) + (medals * 180);
            document.getElementById('score').textContent = score;
            
            if (player.y < 30 || player.y > 490) {
                if (!player.hasShield) {
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    if (lives <= 0) {
                        endGame();
                        return;
                    } else {
                        player.hasShield = true;
                        player.shieldTime = Date.now() + 2000;
                        player.y = Math.max(35, Math.min(485, player.y));
                    }
                }
            }
        }
        
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.rotation * Math.PI / 180);
            
            ctx.shadowColor = '#f59e0b';
            ctx.shadowBlur = 12;
            
            ctx.fillStyle = '#334155';
            ctx.beginPath();
            ctx.moveTo(-22, 0);
            ctx.lineTo(26, -7);
            ctx.lineTo(32, 0);
            ctx.lineTo(26, 7);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#475569';
            ctx.beginPath();
            ctx.moveTo(4, -2);
            ctx.lineTo(-8, -18);
            ctx.lineTo(12, -4);
            ctx.closePath();
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(4, 2);
            ctx.lineTo(-8, 18);
            ctx.lineTo(12, 4);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#60a5fa';
            ctx.beginPath();
            ctx.ellipse(14, 0, 6, 3.5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            if (climbPressed) {
                ctx.fillStyle = '#fbbf24';
                ctx.beginPath();
                ctx.moveTo(-22, -3);
                ctx.lineTo(-38, 0);
                ctx.lineTo(-22, 3);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#fef08c';
                ctx.beginPath();
                ctx.moveTo(-22, -2);
                ctx.lineTo(-32, 0);
                ctx.lineTo(-22, 2);
                ctx.closePath();
                ctx.fill();
            }
            
            ctx.fillStyle = '#1e2937';
            ctx.beginPath();
            ctx.moveTo(32, 0);
            ctx.lineTo(38, -3);
            ctx.lineTo(38, 3);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
            
            if (player.hasShield) {
                ctx.strokeStyle = '#60a5fa';
                ctx.lineWidth = 3;
                ctx.shadowColor = '#60a5fa';
                ctx.shadowBlur = 18;
                ctx.beginPath();
                ctx.arc(player.x, player.y, 38, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }
        
        function drawEnemy(enemy) {
            ctx.save();
            ctx.translate(enemy.x, enemy.y);
            
            if (enemy.type === 'drone') {
                ctx.fillStyle = '#dc2626';
                ctx.shadowColor = '#ef4444';
                ctx.shadowBlur = 8;
                
                ctx.fillRect(-8, -4, 16, 8);
                
                ctx.fillStyle = '#991b1b';
                ctx.beginPath();
                ctx.arc(-10, -8, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(10, -8, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(-10, 8, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(10, 8, 5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#f87171';
                ctx.beginPath();
                ctx.arc(0, 0, 3, 0, Math.PI * 2);
                ctx.fill();
            } else if (enemy.type === 'fighter') {
                ctx.fillStyle = '#b91c1c';
                ctx.shadowColor = '#ef4444';
                ctx.shadowBlur = 6;
                
                ctx.beginPath();
                ctx.moveTo(-12, 0);
                ctx.lineTo(14, -5);
                ctx.lineTo(18, 0);
                ctx.lineTo(14, 5);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#991b1b';
                ctx.beginPath();
                ctx.moveTo(2, 0);
                ctx.lineTo(-6, -12);
                ctx.lineTo(6, -2);
                ctx.closePath();
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(2, 0);
                ctx.lineTo(-6, 12);
                ctx.lineTo(6, 2);
                ctx.closePath();
                ctx.fill();
            } else if (enemy.type === 'helicopter') {
                ctx.fillStyle = '#166534';
                ctx.shadowColor = '#22c55e';
                ctx.shadowBlur = 6;
                
                ctx.beginPath();
                ctx.ellipse(0, 0, 14, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#4ade80';
                ctx.beginPath();
                ctx.arc(0, -12, 4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#4ade80';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-18, -12);
                ctx.lineTo(18, -12);
                ctx.stroke();
            } else if (enemy.type === 'bomber') {
                ctx.fillStyle = '#374151';
                ctx.shadowColor = '#6b7280';
                ctx.shadowBlur = 8;
                
                ctx.beginPath();
                ctx.ellipse(0, 0, 22, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#1f2937';
                ctx.beginPath();
                ctx.ellipse(-8, 0, 6, 4, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
            ctx.shadowBlur = 0;
        }
        
        function drawMissile(missile) {
            ctx.save();
            ctx.translate(missile.x, missile.y);
            
            ctx.fillStyle = '#ef4444';
            ctx.shadowColor = '#f87171';
            ctx.shadowBlur = 6;
            
            ctx.fillRect(-10, -2.5, 20, 5);
            
            ctx.fillStyle = '#b91c1c';
            ctx.beginPath();
            ctx.moveTo(-10, -2);
            ctx.lineTo(-16, -6);
            ctx.lineTo(-10, -2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(-10, 2);
            ctx.lineTo(-16, 6);
            ctx.lineTo(-10, 2);
            ctx.fill();
            
            ctx.fillStyle = '#f87171';
            ctx.beginPath();
            ctx.moveTo(10, -2.5);
            ctx.lineTo(18, 0);
            ctx.lineTo(10, 2.5);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
            ctx.shadowBlur = 0;
        }
        
        function drawPowerup(powerup) {
            ctx.save();
            ctx.translate(powerup.x, powerup.y);
            
            if (powerup.type === 'shield') {
                ctx.fillStyle = '#3b82f6';
                ctx.shadowColor = '#60a5fa';
                ctx.shadowBlur = 14;
                ctx.beginPath();
                ctx.arc(0, 0, 11, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#bae6fd';
                ctx.beginPath();
                ctx.arc(0, 0, 6, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillStyle = '#fbbf24';
                ctx.shadowColor = '#fcd34d';
                ctx.shadowBlur = 14;
                ctx.beginPath();
                ctx.arc(0, 0, 11, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#fef08c';
                ctx.beginPath();
                ctx.arc(0, 0, 6, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
            ctx.shadowBlur = 0;
        }
        
        function draw() {
            ctx.clearRect(0, 0, 420, 520);
            
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            for (let i = 0; i < 28; i++) {
                const x = (i * 37) % 420;
                const y = ((i * 19) % 520);
                ctx.fillRect(x, y, 1.5, 1.5);
            }
            
            ctx.fillStyle = '#fef08c';
            ctx.shadowColor = '#fbbf24';
            ctx.shadowBlur = 8;
            for (const m of playerMissiles) {
                ctx.fillRect(m.x, m.y - 1.5, 14, 3);
            }
            ctx.shadowBlur = 0;
            
            for (const e of enemies) {
                drawEnemy(e);
            }
            
            for (const m of missiles) {
                drawMissile(m);
            }
            
            for (const p of powerups) {
                drawPowerup(p);
            }
            
            drawPlayer();
            
            for (const p of particles) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 45;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '13px Inter';
            ctx.fillText(`${Math.floor(distance)}m`, 20, 28);
        }
        
        function gameLoop() {
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function startCountdown() {
            gameState = 'countdown';
            const countdownEl = document.getElementById('countdown');
            countdownEl.classList.remove('hidden');
            
            let count = 3;
            countdownEl.textContent = count;
            
            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.textContent = count;
                } else {
                    countdownEl.textContent = 'GO!';
                    setTimeout(() => {
                        countdownEl.classList.add('hidden');
                        gameState = 'playing';
                        resetGame();
                        gameLoop();
                    }, 450);
                    clearInterval(interval);
                }
            }, 650);
        }
        
        function startGame() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            startCountdown();
        }
        
        function endGame() {
            gameState = 'gameover';
            
            const finalDistanceEl = document.getElementById('finalDistance');
            const finalMedalsEl = document.getElementById('finalMedals');
            const finalKillsEl = document.getElementById('finalKills');
            const rewardCoinsEl = document.getElementById('rewardCoins');
            const rewardStarsEl = document.getElementById('rewardStars');
            
            finalDistanceEl.textContent = Math.floor(distance) + 'm';
            finalMedalsEl.textContent = medals;
            finalKillsEl.textContent = Math.floor(score / 85);
            
            const coinsEarned = Math.floor(score * 0.8) + (medals * 120);
            const starsEarned = Math.max(1, Math.floor(medals / 2));
            
            rewardCoinsEl.textContent = coinsEarned;
            rewardStarsEl.textContent = starsEarned;
            
            if (score > highScore) {
                highScore = score;
                window.game.highScores = window.game.highScores || {};
                window.game.highScores.eagleStrike = highScore;
                saveGame(window.game);
                localStorage.setItem('eagleHighScore', highScore);
                document.getElementById('highScore').textContent = highScore.toLocaleString();
            }
            
            document.getElementById('gameOverScreen').classList.remove('hidden');
            
            window.pendingRewards = { coins: coinsEarned, stars: starsEarned };
        }
        
        function claimRewards() {
            if (!window.pendingRewards) return;
            
            const coins = window.pendingRewards.coins;
            const stars = window.pendingRewards.stars;
            
            addReward('heroCoins', coins);
            addReward('stars', stars);
            
            const btns = document.querySelectorAll('#gameOverScreen button');
            btns.forEach(b => b.style.display = 'none');
            
            const msg = document.createElement('div');
            msg.className = 'text-center py-4';
            msg.innerHTML = `
                <div class="text-emerald-400 text-4xl mb-2">✅</div>
                <div class="font-bold text-xl">Rewards Claimed!</div>
                <div class="text-sm text-slate-400 mt-1">Added to your VETS RUSH balance</div>
            `;
            
            document.getElementById('gameOverScreen').appendChild(msg);
            
            setTimeout(() => {
                document.getElementById('gameOverScreen').classList.add('hidden');
                msg.remove();
                btns.forEach(b => b.style.display = 'flex');
                window.pendingRewards = null;
                startGame();
            }, 2200);
        }
        
        function returnToVetsRush() {
            if (window.pendingRewards) {
                addReward('heroCoins', window.pendingRewards.coins);
                addReward('stars', window.pendingRewards.stars);
                window.pendingRewards = null;
            }
            
            window.location.href = 'index.html';
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            startCountdown();
        }
        
        function startClimb() {
            climbPressed = true;
        }
        
        function stopClimb() {
            climbPressed = false;
        }
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            climbPressed = true;
        });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            climbPressed = false;
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp') {
                e.preventDefault();
                climbPressed = true;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp') {
                climbPressed = false;
            }
        });
        
        function initGame() {
            const startScreen = document.createElement('div');
            startScreen.className = 'absolute inset-0 bg-black/80 flex items-center justify-center z-50';
            startScreen.innerHTML = `
                <div class="text-center">
                    <div class="text-7xl mb-6">🦅</div>
                    <div class="text-4xl font-black mb-2 tracking-wider">EAGLE STRIKE</div>
                    <div class="text-orange-400 mb-8">VETS RUSH MISSION</div>
                    
                    <button onclick="startGameFromButton(this)" 
                            class="px-12 py-4 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold text-xl rounded-2xl flex items-center gap-3 mx-auto hover:brightness-110 transition-all">
                        <i class="fas fa-play mr-2"></i> START MISSION
                    </button>
                    
                    <div class="mt-8 text-xs text-slate-500">Tap &amp; hold CLIMB to rise • Release to dive</div>
                </div>
            `;
            document.querySelector('.game-container').appendChild(startScreen);
            
            window.startGameFromButton = function(btn) {
                btn.parentElement.parentElement.remove();
                startCountdown();
            };
            
            ctx.fillStyle = '#1e3a8a';
            ctx.fillRect(0, 0, 420, 520);
            
            drawPlayer();
        }
        
        window.onload = function() {
            initGame();
        };
        
        window.EagleStrike = { startGame: () => startCountdown() };
    </script>
</body>
</html>
